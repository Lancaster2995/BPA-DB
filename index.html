<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>BPA Beast</title>
<meta name="application-name" content="BPA Beast">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="BPA Beast">
<meta name="theme-color" content="#0d7d72">
<link rel="apple-touch-icon" href="./apple-touch-icon.png">
<link rel="manifest" href="./manifest.json">
<style>
/* ======== TOKENS ======== */
:root{
  --bg-app:#f8fafc; --bg-surface:#fff; --bg-surface2:#f1f5f9; --bg-surface3:#e2e8f0;
  --border:#e2e8f0; --border-strong:#cbd5e1;
  --t1:#0f172a; --t2:#334155; --t3:#64748b; --t4:#94a3b8;
  --teal:#0d7d72; --teal-d:#0a6359; --teal-bg:#ecf7f5;
  --em-bg:#ecfdf5; --em-t:#047857; --em-d:#10b981;
  --am-bg:#fffbeb; --am-t:#b45309; --am-d:#f59e0b;
  --ro-bg:#fff1f2; --ro-t:#be123c; --ro-d:#f43f5e;
  --pill-on:#0f172a; --pill-on-t:#fff;
  --tr-track:#cbd5e1; --tr-thumb:#fff;
  --radius:14px;
}
body.dark{
  --bg-app:#0d1117; --bg-surface:#161b22; --bg-surface2:#1c2330; --bg-surface3:#21262d;
  --border:#30363d; --border-strong:#444c56;
  --t1:#e6edf3; --t2:#c9d1d9; --t3:#8b949e; --t4:#3d444d;
  --teal:#2dd4bf; --teal-d:#14b8a6; --teal-bg:#0d2624;
  --em-bg:#0d2e1f; --em-t:#34d399; --em-d:#10b981;
  --am-bg:#2d1f06; --am-t:#fbbf24; --am-d:#f59e0b;
  --ro-bg:#2d0a14; --ro-t:#fb7185; --ro-d:#f43f5e;
  --pill-on:#e6edf3; --pill-on-t:#0d1117;
  --tr-track:#2dd4bf; --tr-thumb:#0d1117;
}

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{margin:0;font-family:'Inter',system-ui,-apple-system,sans-serif;background:var(--bg-app);color:var(--t1);transition:background .2s,color .2s;}
button{font-family:inherit;cursor:pointer;border:none;background:none;padding:0;}
input{font-family:inherit;}

/* ======== LAYOUT ======== */
/* Desktop: sidebar left + main right */
.app{display:flex;height:100vh;width:100%;}
#appRoot{display:none;}
.sidebar{
  width:240px;flex-shrink:0;background:var(--bg-surface);border-right:1px solid var(--border);
  padding:14px;display:flex;flex-direction:column;gap:0;
  transition:width .2s,padding .2s;overflow:hidden;
}
.sidebar.collapsed{width:56px;padding:14px 8px;}
.main{flex:1;overflow-y:auto;padding:24px;}
.bottom-nav{display:none;}/* hidden on desktop */

/* Mobile: full width + bottom nav */
@media(max-width:640px){
  .app{flex-direction:column;}
  .sidebar{display:none !important;}
  .main{padding:16px 14px 80px;height:100%;overflow-y:auto;}
  .bottom-nav{
    display:flex;position:fixed;bottom:0;left:0;right:0;z-index:50;
    background:var(--bg-surface);border-top:1px solid var(--border);
    padding:6px 0 env(safe-area-inset-bottom,6px);
  }
  .bn-item{
    flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
    padding:6px 4px;font-size:9.5px;font-weight:600;color:var(--t4);
    transition:color .15s;
  }
  .bn-item.active{color:var(--teal);}
  .bn-icon{font-size:18px;line-height:1;}
}

/* ======== BRAND + DARK TOGGLE ======== */
.brand{display:flex;align-items:center;justify-content:space-between;gap:6px;padding:0 2px;margin-bottom:16px;}
.brand-text .brand-title{font-size:14px;font-weight:800;letter-spacing:-.02em;color:var(--t1);white-space:nowrap;}
.brand-text .brand-sub{font-size:10px;color:var(--t3);white-space:nowrap;}
body.dark .brand-text .brand-sub{color:var(--t2);}
.brand-right{display:flex;align-items:center;gap:4px;flex-shrink:0;}
/* collapsed: hide text */
.sidebar.collapsed .brand-text,
.sidebar.collapsed .empresa-info,
.sidebar.collapsed .chevron,
.sidebar.collapsed .nav-label,
.sidebar.collapsed .footer-note{display:none;}
.sidebar.collapsed .empresa-btn{justify-content:center;padding:8px;}
.sidebar.collapsed .nav-item{justify-content:center;gap:0;}
.sidebar.collapsed .brand-right{flex-direction:column;}

/* dark toggle */
.dark-toggle{
  position:relative;width:34px;height:19px;border-radius:99px;
  background:var(--tr-track);border:none;cursor:pointer;flex-shrink:0;
  transition:background .2s;
}
.dark-toggle::after{
  content:'';position:absolute;top:2.5px;left:2.5px;
  width:14px;height:14px;border-radius:50%;background:var(--tr-thumb);
  transition:transform .2s;
}
body.dark .dark-toggle::after{transform:translateX(15px);}
.dark-toggle-icon{position:absolute;top:50%;transform:translateY(-50%);font-size:9px;pointer-events:none;}
.dark-toggle-icon.moon{right:3px;} .dark-toggle-icon.sun{left:3px;display:none;}
body.dark .dark-toggle-icon.moon{display:none;} body.dark .dark-toggle-icon.sun{display:block;}

.collapse-btn{
  width:22px;height:22px;border-radius:6px;background:var(--bg-surface2);
  display:flex;align-items:center;justify-content:center;color:var(--t3);font-size:10px;flex-shrink:0;
}

/* ======== MOBILE HEADER ======== */
.mobile-header{
  display:none;align-items:center;justify-content:space-between;
  padding:12px 14px 0;background:var(--bg-surface);border-bottom:1px solid var(--border);
  margin:-16px -14px 16px;padding-bottom:12px;
}
@media(max-width:640px){.mobile-header{display:flex;}}
.mh-left{display:flex;align-items:center;gap:10px;}
.mh-brand{font-size:15px;font-weight:800;letter-spacing:-.02em;color:var(--t1);}
.mh-empresa{font-size:11px;color:var(--t3);}

/* ======== EMPRESA SELECTOR ======== */
.empresa-panel{position:relative;margin-bottom:4px;}
.empresa-btn{
  width:100%;display:flex;align-items:center;gap:8px;
  border:1px solid var(--border);background:var(--bg-surface);
  border-radius:10px;padding:8px 10px;text-align:left;
}
.empresa-btn:hover{border-color:var(--border-strong);}
.empresa-icon{
  width:28px;height:28px;border-radius:7px;background:var(--teal);color:#fff;
  display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;
}
.empresa-info{min-width:0;flex:1;}
.empresa-nombre{font-size:12.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--t1);}
.empresa-ruc{font-size:10.5px;color:var(--t3);}
.chevron{color:var(--t4);font-size:9px;flex-shrink:0;transition:transform .15s;}
.chevron.open{transform:rotate(180deg);}
.empresa-dropdown{
  position:absolute;z-index:40;margin-top:5px;width:100%;
  background:var(--bg-surface);border:1px solid var(--border);border-radius:10px;
  padding:5px;box-shadow:0 10px 30px rgba(0,0,0,.12);display:none;
}
.empresa-dropdown.show{display:block;}
.empresa-opt{
  width:100%;display:flex;align-items:center;gap:7px;padding:7px 9px;
  border-radius:7px;font-size:12.5px;color:var(--t2);
}
.empresa-opt:hover{background:var(--bg-surface2);}
.empresa-opt.active{color:var(--teal);font-weight:600;}
.empresa-divider{height:1px;background:var(--border);margin:5px 0;}
.empresa-add{color:var(--teal);font-weight:500;}

/* ======== NAV ======== */
.nav{flex:1;display:flex;flex-direction:column;gap:1px;margin-top:16px;}
.nav-item{
  width:100%;display:flex;align-items:center;gap:9px;
  padding:8px 10px;border-radius:8px;
  font-size:13px;font-weight:500;color:var(--t3);
}
.nav-item:hover{background:var(--bg-surface2);}
.nav-item.active{background:var(--teal-bg);color:var(--teal);}
.nav-icon{width:16px;text-align:center;flex-shrink:0;}
.footer-note{font-size:10.5px;color:var(--t4);background:var(--bg-surface2);padding:8px 9px;border-radius:8px;line-height:1.4;}

/* ======== SHARED VIEW COMPONENTS ======== */
.view-header{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:18px;}
.view-title{font-size:18px;font-weight:700;letter-spacing:-.01em;line-height:1.2;}
.view-sub{font-size:12px;color:var(--t3);margin-top:3px;line-height:1.4;}

.btn-primary{
  display:flex;align-items:center;gap:5px;background:var(--teal);color:#fff;
  border-radius:9px;padding:9px 13px;font-size:13px;font-weight:600;white-space:nowrap;flex-shrink:0;
}
.btn-primary:hover{background:var(--teal-d);}
.btn-secondary{
  display:flex;align-items:center;gap:5px;background:var(--bg-surface);color:var(--t2);
  border:1px solid var(--border);border-radius:9px;padding:9px 13px;font-size:13px;font-weight:600;white-space:nowrap;
}
.btn-secondary:hover{border-color:var(--border-strong);background:var(--bg-surface2);}

/* badges */
.badge{display:inline-flex;align-items:center;gap:4px;border-radius:99px;padding:4px 9px;font-size:11px;font-weight:700;white-space:nowrap;}
.badge .bdot{width:5px;height:5px;border-radius:50%;flex-shrink:0;}
.badge.vigente,.badge.realizada,.badge.liberado{background:var(--em-bg);color:var(--em-t);}
.badge.vigente .bdot,.badge.realizada .bdot,.badge.liberado .bdot{background:var(--em-d);}
.badge.por_vencer,.badge.cuarentena{background:var(--am-bg);color:var(--am-t);}
.badge.por_vencer .bdot,.badge.cuarentena .bdot{background:var(--am-d);}
.badge.vencido,.badge.vencida,.badge.rechazado{background:var(--ro-bg);color:var(--ro-t);}
.badge.vencido .bdot,.badge.vencida .bdot,.badge.rechazado .bdot{background:var(--ro-d);}
.badge.pendiente{background:var(--bg-surface2);color:var(--t3);}
.badge.pendiente .bdot{background:var(--t4);}

/* pill filters */
.filter-pills{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px;}
.pill{background:var(--bg-surface2);color:var(--t3);border-radius:99px;padding:6px 11px;font-size:11.5px;font-weight:600;}
.pill.active{background:var(--pill-on);color:var(--pill-on-t);}
.pill:hover:not(.active){background:var(--bg-surface3);}

/* search */
.search-wrap{position:relative;margin-bottom:12px;}
.search-wrap input{
  width:100%;border:1px solid var(--border);border-radius:9px;
  padding:10px 12px 10px 34px;font-size:13px;
  background:var(--bg-surface);color:var(--t1);
}
.search-wrap input:focus{outline:none;border-color:var(--teal);box-shadow:0 0 0 3px rgba(13,125,114,.12);}
.search-ico{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--t4);pointer-events:none;}

/* section title */
.section-title{font-size:12px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.04em;margin:22px 0 10px;}

/* ======== DASHBOARD ======== */
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px;}
@media(max-width:400px){.stat-grid{grid-template-columns:1fr 1fr;}}
.stat-card{
  background:var(--bg-surface);border:1px solid var(--border);border-radius:12px;
  padding:12px;cursor:pointer;transition:.15s;text-align:left;
}
.stat-card:hover{border-color:var(--border-strong);}
.stat-icon{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;margin-bottom:8px;background:var(--bg-surface2);color:var(--t3);}
.stat-icon.crit{background:var(--ro-bg);color:var(--ro-t);}
.stat-val{font-size:26px;font-weight:800;color:var(--t1);font-variant-numeric:tabular-nums;}
.stat-val.crit{color:var(--ro-t);}
.stat-label{font-size:11px;font-weight:600;color:var(--t2);margin-top:2px;line-height:1.3;}
.stat-detail{font-size:10.5px;color:var(--t3);margin-top:1px;line-height:1.3;}

/* timeline */
.tl-card{background:var(--bg-surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
.tl-row{display:flex;align-items:center;gap:10px;padding:11px 14px;border-bottom:1px solid var(--border);}
.tl-row:last-child{border-bottom:none;}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.dot.vigente,.dot.realizada{background:var(--em-d);}
.dot.por_vencer{background:var(--am-d);}
.dot.vencido,.dot.vencida{background:var(--ro-d);}
.tl-mid{flex:1;min-width:0;}
.tl-type{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--t4);}
.tl-name{font-size:12.5px;color:var(--t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px;}
.tl-days{font-size:11px;font-weight:700;flex-shrink:0;text-align:right;}
.tl-days.late{color:var(--ro-t);} .tl-days.soon{color:var(--am-t);} .tl-days.ok{color:var(--t4);}

/* ======== DOCUMENT CARDS (mobile-first) ======== */
.doc-card{
  background:var(--bg-surface);border:1px solid var(--border);border-radius:12px;
  padding:13px 14px;margin-bottom:9px;
}
.doc-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;}
.doc-codigo{font-family:ui-monospace,'SF Mono',Consolas,monospace;font-size:11px;color:var(--t3);margin-bottom:3px;}
.doc-nombre{font-size:13.5px;font-weight:600;color:var(--t1);line-height:1.35;}
.doc-meta{display:flex;gap:12px;margin-top:8px;flex-wrap:wrap;}
.doc-meta-item{font-size:11px;color:var(--t3);}
.doc-meta-item strong{color:var(--t2);font-weight:600;}

/* ======== CAPACITACION CARDS ======== */
.progress-card{background:var(--bg-surface);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:18px;}
.progress-top{display:flex;justify-content:space-between;font-size:12px;color:var(--t3);margin-bottom:7px;}
.progress-top strong{color:var(--t2);}
.progress-bar{height:7px;background:var(--bg-surface2);border-radius:99px;overflow:hidden;}
.progress-fill{height:100%;background:var(--teal);border-radius:99px;transition:width .4s;}

.cap-card{background:var(--bg-surface);border:1px solid var(--border);border-radius:12px;padding:13px 14px;margin-bottom:8px;}
.cap-row1{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:6px;}
.cap-icon{font-size:16px;flex-shrink:0;margin-top:1px;}
.cap-icon.ok{color:var(--em-d);} .cap-icon.bad{color:var(--ro-d);} .cap-icon.pend{color:var(--t4);}
.cap-name{font-size:13.5px;font-weight:600;color:var(--t1);line-height:1.3;flex:1;min-width:0;}
.cap-meta{font-size:11px;color:var(--t3);margin-top:2px;}
.cap-row2{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px;border-top:1px solid var(--border);padding-top:8px;margin-top:4px;}
.cap-fecha{font-size:11.5px;color:var(--t3);}
.cap-dias{font-size:11.5px;font-weight:700;}
.cap-dias.late{color:var(--ro-t);} .cap-dias.soon{color:var(--am-t);} .cap-dias.ok{color:var(--t4);}

/* ======== AUTOINSPECCIÓN CARDS ======== */
.insp-card{background:var(--bg-surface);border:1px solid var(--border);border-radius:12px;padding:13px 14px;margin-bottom:9px;}
.insp-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;}
.insp-area{font-size:13.5px;font-weight:600;color:var(--t1);line-height:1.3;}
.insp-meta{font-size:11px;color:var(--t3);margin-top:3px;line-height:1.5;}
.insp-footer{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;border-top:1px solid var(--border);margin-top:11px;padding-top:11px;}
.hallazgo{display:flex;align-items:center;gap:4px;background:var(--am-bg);color:var(--am-t);border-radius:99px;padding:4px 9px;font-size:11px;font-weight:700;}

/* ======== PRODUCTO CARDS ======== */
.prod-card{background:var(--bg-surface);border:1px solid var(--border);border-radius:12px;padding:13px 14px;margin-bottom:9px;}
.prod-lote{font-family:ui-monospace,'SF Mono',Consolas,monospace;font-size:11px;color:var(--t3);margin-bottom:3px;}
.prod-nombre{font-size:13.5px;font-weight:600;color:var(--t1);line-height:1.3;margin-bottom:8px;}

.prod-rs{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px;
  background:var(--bg-surface2);border-radius:8px;padding:8px 10px;margin-bottom:8px;}
.prod-rs-num{font-family:ui-monospace,'SF Mono',Consolas,monospace;font-size:11.5px;color:var(--t2);font-weight:600;}
.rs-ok{color:var(--em-t);font-size:11px;font-weight:700;}
.rs-warn{color:var(--am-t);font-size:11px;font-weight:700;}
.rs-bad{color:var(--ro-t);font-size:11px;font-weight:700;}

.prod-trace{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;}
@media(max-width:380px){.prod-trace{grid-template-columns:1fr;}}
.trace-block{background:var(--bg-surface2);border-radius:8px;padding:8px 10px;}
.trace-label{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--t4);margin-bottom:3px;}
.trace-name{font-size:12px;font-weight:600;color:var(--t1);line-height:1.3;}
.trace-dir{font-size:10.5px;color:var(--t3);margin-top:2px;line-height:1.3;}

.prod-bottom{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px;}
.prod-fecha{font-size:11px;color:var(--t3);}

/* ======== DRIVE SYNC ======== */
.drive-config{background:var(--bg-surface);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:14px;}
.drive-config h3{font-size:13.5px;font-weight:700;color:var(--t1);margin:0 0 4px;}
.drive-config .desc{font-size:12px;color:var(--t3);margin:0 0 12px;line-height:1.5;}
.drive-input{display:flex;gap:8px;margin-bottom:8px;}
.drive-input input{flex:1;border:1px solid var(--border);border-radius:8px;padding:9px 11px;font-size:12px;background:var(--bg-surface2);color:var(--t2);}
.drive-status{display:flex;align-items:center;gap:7px;font-size:11.5px;color:var(--t3);padding:8px 10px;background:var(--bg-surface2);border-radius:8px;}
.ok-dot{width:6px;height:6px;border-radius:50%;background:var(--em-d);flex-shrink:0;}
.drive-tree{font-size:12px;color:var(--t2);margin-top:12px;line-height:1.9;}
.drive-tree .fold{font-weight:700;color:var(--t1);}
.drive-tree .ind{padding-left:16px;color:var(--t3);}
.drive-tree .cnt{color:var(--t4);font-size:10.5px;}
.rule-box{background:var(--bg-surface2);border:1px solid var(--border);border-radius:9px;padding:11px 12px;margin-top:12px;}
.rule-box .rtitle{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;color:var(--t4);margin-bottom:5px;}
.rule-box code{font-family:ui-monospace,'SF Mono',monospace;font-size:11px;background:var(--bg-app);border:1px solid var(--border);padding:2px 5px;border-radius:4px;color:var(--teal);}
.rule-box p{font-size:11.5px;color:var(--t2);margin:5px 0 0;line-height:1.6;}

.sync-feed{background:var(--bg-surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
.sf-header{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.sf-header h3{margin:0;font-size:13.5px;font-weight:700;color:var(--t1);}
.sf-count{font-size:11px;color:var(--t4);}
.sf-row{display:flex;gap:10px;padding:12px 14px;border-bottom:1px solid var(--border);}
.sf-row:last-child{border-bottom:none;}
.sf-icon{width:26px;height:26px;border-radius:7px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;}
.fold-group{margin:4px 0;}
.root-fold{font-weight:800;font-size:13px;color:var(--t1);}
.ind-file{display:flex;align-items:center;gap:6px;padding:3px 0 3px 18px;font-size:11.5px;border-bottom:1px solid var(--border);flex-wrap:nowrap;}
.ind-file:last-child{border-bottom:none;}
.ind-code{font-weight:700;color:var(--teal);white-space:nowrap;min-width:80px;}
.ind-name{color:var(--t2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.ind-ver{color:var(--t4);font-size:10.5px;white-space:nowrap;}
.ind-link{color:var(--teal);text-decoration:none;font-size:12px;padding:2px 4px;border-radius:4px;}
.ind-link:hover{background:var(--teal-bg);}

.sf-icon.changed{background:var(--am-bg);color:var(--am-t);}

function openModal(html, onReady){
  let ov=document.getElementById('appModalOv');

  ov.innerHTML=`<div class="modal">${html}</div>`;
  ov.classList.add('show');

function refreshSidebarEmpresa(){
  const emp=empresa();
  const ni=document.getElementById('eNombre');const ri=document.getElementById('eRuc');const ii=document.getElementById('eIcon');
  if(ni)ni.textContent=emp.nombre;if(ri)ri.textContent=emp.ruc;if(ii){ii.textContent=emp.init;ii.style.background='var(--teal)';}
  // rebuild dropdown options
  const drop=document.getElementById('empresaDropdown');
  if(drop){
    const adds=drop.querySelector('.empresa-add');
    drop.innerHTML='';
    EMPRESAS.forEach(e=>{
      const row=document.createElement('div');
      row.style.cssText='display:flex;align-items:center;gap:2px;padding:2px 4px 2px 2px;border-radius:7px;';
      const btn=document.createElement('button');
      btn.className='empresa-opt'+(S.emp===e.id?' active':'');
      btn.style.cssText='flex:1;border-radius:7px;margin:0;';
      btn.dataset.id=e.id;btn.dataset.nombre=e.nombre;btn.dataset.ruc=e.ruc;btn.dataset.init=e.init;
      btn.textContent=e.nombre;
      btn.addEventListener('click',()=>{
        document.querySelectorAll('.empresa-opt').forEach(o=>o.classList.remove('active'));btn.classList.add('active');
        document.getElementById('eNombre').textContent=e.nombre;document.getElementById('eRuc').textContent=e.ruc;document.getElementById('eIcon').textContent=e.init;
        S.emp=e.id;drop.classList.remove('show');document.getElementById('chevron').classList.remove('open');render();
      });
      row.appendChild(btn);
      if(EMPRESAS.length>1){
        const delBtn=document.createElement('button');
        delBtn.title='Eliminar droguería';
        // Siempre visible en móvil touch — no depende de hover
        delBtn.style.cssText='flex-shrink:0;width:32px;height:32px;border-radius:6px;border:1px solid var(--ro-t);background:var(--ro-bg);color:var(--ro-t);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;';
        delBtn.textContent='🗑';
        delBtn.addEventListener('click',(ev)=>{
          ev.stopPropagation();
          drop.classList.remove('show');document.getElementById('chevron').classList.remove('open');
          modalEliminarEmpresa(e.id);
        });
        row.appendChild(delBtn);
      }
      drop.appendChild(row);
    });
    const div=document.createElement('div');div.className='empresa-divider';drop.appendChild(div);
    const addBtn=document.createElement('button');addBtn.className='empresa-opt empresa-add';addBtn.textContent='+ Agregar droguería';
    addBtn.addEventListener('click',()=>{drop.classList.remove('show');modalAgregarEmpresa();});
    drop.appendChild(addBtn);
  }
}

/* ===== VIEWS ===== */
function vDashboard(){
  const docs=DOCUMENTOS.filter(d=>d.e===S.emp);
  const caps=CAPS.filter(c=>c.e===S.emp);
  const insp=INSP.filter(i=>i.e===S.emp);
  const dV=docs.filter(d=>edoc(d)==='vencido').length;
  const dPV=docs.filter(d=>edoc(d)==='por_vencer').length;
  const cPend=caps.filter(c=>ecap(c)==='pendiente'||ecap(c)==='vencida').length;
  const cV=caps.filter(c=>ecap(c)==='vencida').length;
  const hall=insp.reduce((a,i)=>a+i.hall,0);
  const proxI=insp.filter(i=>!i.real).sort((a,b)=>new Date(a.prog)-new Date(b.prog))[0];
  const evs=[
    ...docs.map(d=>({tipo:"Documento",nombre:`${d.codigo} · ${d.nombre}`,fecha:d.rev,est:edoc(d)})),
    ...caps.filter(c=>ecap(c)!=='realizada').map(c=>({tipo:"Capacitación",nombre:c.tema,fecha:c.fecha,est:ecap(c)==='vencida'?'vencido':dias(c.fecha)<=30?'por_vencer':'vigente'})),
    ...insp.filter(i=>!i.real).map(i=>({tipo:"Inspección",nombre:i.area,fecha:i.prog,est:dias(i.prog)<0?'vencido':dias(i.prog)<=30?'por_vencer':'vigente'})),
  ].sort((a,b)=>new Date(a.fecha)-new Date(b.fecha));
  return`
    <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px">
      <div><div class="view-title" style="margin-bottom:4px">Resumen</div><div class="view-sub">BPA · ${empresa().nombre}</div></div>
      <button class="btn-secondary" style="font-size:11.5px;padding:6px 10px;gap:4px" id="btnExportar">⬇ Exportar</button>
    </div>
    <div class="stat-grid">
      <button class="stat-card" data-goto="documentos">
        <div class="stat-icon ${dV>0?'crit':''}">▤</div>
        <div class="stat-val ${dV>0?'crit':''}">${dV}</div>
        <div class="stat-label">Docs vencidos</div>
        <div class="stat-detail">${dPV} por vencer</div>
      </button>
      <button class="stat-card" data-goto="capacitaciones">
        <div class="stat-icon ${cV>0?'crit':''}">◉</div>
        <div class="stat-val ${cV>0?'crit':''}">${cPend}</div>
        <div class="stat-label">Capacit. pendientes</div>
        <div class="stat-detail">${cV} vencidas</div>
      </button>
      <button class="stat-card" data-goto="autoinspecciones">
        <div class="stat-icon ${hall>0?'crit':''}">✓</div>
        <div class="stat-val ${hall>0?'crit':''}">${hall}</div>
        <div class="stat-label">Hallazgos abiertos</div>
        <div class="stat-detail">${proxI?proxI.area:'Al día'}</div>
      </button>
    </div>
    <div class="section-title">Próximos vencimientos</div>
    <div class="tl-card">
      ${evs.slice(0,8).map(e=>{
        const f=fDias(dias(e.fecha));
        return`<div class="tl-row">
          <span class="dot ${e.est}"></span>
          <div class="tl-mid">
            <div class="tl-type">${e.tipo}</div>
            <div class="tl-name">${e.nombre}</div>
          </div>
          <div class="tl-days ${f.cls}">${f.txt}</div>
        </div>`;
      }).join('')}
    </div>`;
}

function vDocumentos(){
  let docs=DOCUMENTOS.filter(d=>d.e===S.emp);
  if(S.qDoc){const q=S.qDoc.toLowerCase();docs=docs.filter(d=>(d.codigo+d.nombre).toLowerCase().includes(q));}
  if(S.filtDoc!=='todos')docs=docs.filter(d=>edoc(d)===S.filtDoc);
  return`
    <div class="view-header">
      <div><div class="view-title">Documentos</div><div class="view-sub">POEs · Formatos · Instructivos</div></div>
      <button class="btn-primary" onclick="modalNuevoDoc()">+ Nuevo</button>
    </div>
    <div class="search-wrap"><span class="search-ico">⌕</span>
      <input id="docQ" placeholder="Buscar código o nombre…" value="${S.qDoc}">
    </div>
    <div class="filter-pills">
      ${['todos','vigente','por_vencer','vencido'].map(f=>
        `<button class="pill ${S.filtDoc===f?'active':''}" data-filtro="${f}">${f==='todos'?'Todos':EL[f]||f}</button>`
      ).join('')}
    </div>
    ${docs.length?docs.map(d=>`
      <div class="doc-card" data-docid="${d.id}">
        <div class="doc-top">
          <div style="min-width:0">
            <div class="doc-codigo">${d.codigo} · v${d.version}</div>
            <div class="doc-nombre">${d.nombre}</div>
          </div>
          ${badge(edoc(d))}
        </div>
        <div class="doc-meta">
          <span class="doc-meta-item"><strong>Área</strong> ${d.area}</span>
          <span class="doc-meta-item"><strong>Tipo</strong> ${d.tipo}</span>
          <span class="doc-meta-item"><strong>Rev.</strong> ${fLocal(d.rev)}</span>
        </div>
      </div>`).join('')

/* ===== GOOGLE DRIVE REAL API ===== */

// Extrae el folder ID del link de Drive
function extractFolderId(url){
  const m = url.match(/\/folders\/([a-zA-Z0-9_-]+)/);
  return m ? m[1] : null;
}

// Obtiene el access token de Google del usuario actual
async function getGoogleAccessToken(){
  try {
    const user = auth.currentUser;
    if(!user) return null;
    // Firebase credential con token de Google
    const token = await user.getIdToken(true);
    // El access token de Google está en el proveedor
    const providerData = user.providerData.find(p => p.providerId === 'google.com');
    if(!providerData) return null;
    // Intentamos obtenerlo desde la sesión de Google
    const cred = await firebase.auth().currentUser?.getIdTokenResult();
    // Usamos gapi si disponible, sino el token almacenado en S
    return S._googleAccessToken || null;
  } catch(e){ return null; }
}

// Intercepta el access token en el signin
function captureGoogleToken(result){
  if(!result || !result.credential) return;
  const credential = result.credential;
  if(credential && credential.accessToken){
    S._googleAccessToken = credential.accessToken;
  }
}

// Lista archivos en una subcarpeta de Drive
async function driveListFolder(parentId, token){
  const url = `https://www.googleapis.com/drive/v3/files?q=${encodeURIComponent(`'${parentId}' in parents and trashed=false`)}&fields=files(id,name,mimeType,modifiedTime,size)&pageSize=100`;
  const res = await fetch(url, { headers: { Authorization: `Bearer ${token}` } });
  if(!res.ok){
    if(res.status===401) throw new Error('Token expirado — vuelve a iniciar sesión');
    if(res.status===403) throw new Error('Sin permiso para leer esta carpeta');
    throw new Error(`Error Drive API: ${res.status}`);
  }
  const data = await res.json();
  return data.files || [];
}

// Parsea nombre de archivo → {codigo, nombre, version, tipo inferido}
function parseFileName(name){
  const clean = name.replace(/\.[^.]+$/, '').trim();

  // Patrones de código BPA conocidos
  const PREFIJOS_POE     = /^(POE|SOP|PNT|PNO|PR|PRO|PROC)\b/i;
  const PREFIJOS_FORMAT  = /^(FOR|FMT|FO|REG|RG|FORM|F-|F_)\b/i;
  const PREFIJOS_INSTR   = /^(INS|INST|IT|INC|MAN|GUIA|GU)\b/i;

  // Intentar parsear separadores comunes: " - ", " – ", "_", " | "
  let parts = [];
  if(clean.includes(' - '))       parts = clean.split(/\s+-\s+/);
  else if(clean.includes(' – '))  parts = clean.split(/\s+–\s+/);
  else if(clean.includes('_'))    parts = clean.split('_');
  else if(clean.includes(' | '))  parts = clean.split(/\s+\|\s+/);
  else                            parts = [clean];

  // Buscar versión en cualquier parte: v01, v1, ver01, versión 1, (v2), etc.
  const verMatch = clean.match(/[\(\s_-]v(?:er(?:si[oó]n)?)?\s*\.?(\d+)/i) || clean.match(/\bv(\d+)\b/i);
  const version = verMatch ? verMatch[1].padStart(2,'0') : '01';

  // El código suele ser la primera parte
  const codigo = parts[0].trim().replace(/\s+/g,'');
  // El nombre es todo lo que no es código ni versión
  const nombreParts = parts.slice(1).filter(p => !p.match(/^v\d+$/i) && !p.match(/^ver/i));
  const nombre = nombreParts.join(' - ').trim() || clean;

  // Inferir tipo por prefijo del código
  let tipoInferido = null;
  if(PREFIJOS_POE.test(codigo))    tipoInferido = 'POE';
  else if(PREFIJOS_FORMAT.test(codigo)) tipoInferido = 'Formato';
  else if(PREFIJOS_INSTR.test(codigo))  tipoInferido = 'Instructivo';

  return { codigo, nombre, version, tipoInferido };
}

// Infiere tipo por contexto: nombre de subcarpeta, ruta, contenido del nombre
function inferirTipoPorContexto(archivo, carpetaNombre){
  const cn = (carpetaNombre||'').toLowerCase();
  const fn = (archivo.name||'').toLowerCase();
  const parsed = parseFileName(archivo.name);

  // Primero por prefijo de código
  if(parsed.tipoInferido) return parsed.tipoInferido;

  // Por nombre de carpeta contenedora
  if(/poe|sop|proc|procedimiento/.test(cn)) return 'POE';
  if(/form|registro|reg|fmt/.test(cn)) return 'Formato';
  if(/inst|instructivo|it\b|manual|guia/.test(cn)) return 'Instructivo';

  // Por nombre del archivo
  if(/\bpoe\b|procedimiento\s+op/.test(fn)) return 'POE';
  if(/\bformat|registro|planilla|lista/.test(fn)) return 'Formato';
  if(/\binst|instructivo|manual\b|guía/.test(fn)) return 'Instructivo';

  // Por extensión + contexto
  if(/\.xlsx?$|\.csv$/i.test(archivo.name)) return 'Formato';
  if(/\.pdf$|\.docx?$/i.test(archivo.name)) return 'POE'; // default para docs

  return 'POE'; // fallback
}

// ===== DRIVE TOKEN MANAGER =====
// Guarda el access token en sessionStorage para sobrevivir renders sin re-pedir
function saveDriveToken(token, expiresIn){
  if(!token) return;
  S._googleAccessToken = token;
  S._googleTokenExp = Date.now() + (expiresIn||3600)*1000;
  try { sessionStorage.setItem('bpa_drive_token', JSON.stringify({token, exp: S._googleTokenExp})); } catch(e){}
}

function loadDriveToken(){
  if(S._googleAccessToken && S._googleTokenExp && Date.now() < S._googleTokenExp - 60000) return S._googleAccessToken;
  try {
    const saved = sessionStorage.getItem('bpa_drive_token');
    if(saved){
      const {token, exp} = JSON.parse(saved);
      if(token && exp && Date.now() < exp - 60000){ S._googleAccessToken=token; S._googleTokenExp=exp; return token; }
    }
  } catch(e){}
  return null;
}

async function requestDriveToken(){
  // 1. Usar token cacheado si aún es válido
  const cached = loadDriveToken();
  if(cached) return cached;

  // 2. signInWithPopup con scope Drive (una sola vez — no es reauthenticate)
  //    En móvil Android si el popup falla, capturamos el error y avisamos al usuario
  try {
    const provider = new firebase.auth.GoogleAuthProvider();
    provider.addScope('https://www.googleapis.com/auth/drive.readonly');
    provider.setCustomParameters({ access_type: 'online', prompt: 'consent' });
    const result = await auth.signInWithPopup(provider);
    if(result && result.credential && result.credential.accessToken){
      saveDriveToken(result.credential.accessToken, 3600);
      return S._googleAccessToken;
    }
  } catch(e){
    const popupFail = ['auth/popup-blocked','auth/popup-closed-by-user','auth/cancelled-popup-request','auth/operation-not-supported-in-this-environment'];
    if(popupFail.includes(e.code)){
      // Móvil — usar redirect con param especial para saber que es solo para Drive token
      sessionStorage.setItem('bpa_pending_drive_sync','1');
      const provider = new firebase.auth.GoogleAuthProvider();
      provider.addScope('https://www.googleapis.com/auth/drive.readonly');
      provider.setCustomParameters({ access_type: 'online', prompt: 'consent' });
      await auth.signInWithRedirect(provider);
      return null; // página se recargará
    }
    console.warn('Drive token request failed:', e.code, e.message);
  }
  return null;
}

// Lista archivos de una carpeta con paginación completa
async function driveListFolder(parentId, token){
  let files = [], pageToken = null;
  do {
    const pt = pageToken ? `&pageToken=${pageToken}` : '';
    const url = `https://www.googleapis.com/drive/v3/files?q=${encodeURIComponent(`'${parentId}' in parents and trashed=false`)}&fields=nextPageToken,files(id,name,mimeType,modifiedTime,size,parents)&pageSize=100${pt}`;
    const res = await fetch(url, { headers: { Authorization: `Bearer ${token}` } });
    if(!res.ok){
      if(res.status===401) throw new Error('Token expirado — cierra sesión y vuelve a entrar para autorizar Drive');
      if(res.status===403) throw new Error('Sin permiso para leer esta carpeta · asegúrate de compartir la carpeta con tu cuenta');
      throw new Error(`Error Drive API: ${res.status}`);
    }
    const data = await res.json();
    files = files.concat(data.files||[]);
    pageToken = data.nextPageToken || null;
  } while(pageToken);
  return files;
}

// Escaneo recursivo: devuelve {archivo, tipo, carpetaNombre}[]
async function driveScanRecursivo(folderId, token, carpetaNombre='', depth=0){
  if(depth > 3) return []; // protección anti-loop
  const items = await driveListFolder(folderId, token);
  let resultado = [];

  // Mapeo flexible de nombres de carpeta → tipo BPA
  const CARPETA_TIPO = {
    'poe':true,'poes':true,'sop':true,'sops':true,'procedimiento':true,'procedimientos':true,
    'formato':true,'formatos':true,'form':true,'forms':true,'registro':true,'registros':true,'reg':true,
    'instructivo':true,'instructivos':true,'instruccion':true,'instrucciones':true,'it':true,'manual':true,'manuales':true
  };

  const subcarpetas = items.filter(f => f.mimeType === 'application/vnd.google-apps.folder');
  const archivos    = items.filter(f => f.mimeType !== 'application/vnd.google-apps.folder');

  // Archivos directamente en esta carpeta
  for(const archivo of archivos){
    const ext = archivo.name.split('.').pop().toLowerCase();
    if(!['pdf','doc','docx','xls','xlsx','ppt','pptx','txt','odt','ods'].includes(ext)) continue;
    resultado.push({ archivo, tipo: inferirTipoPorContexto(archivo, carpetaNombre), carpetaNombre });
  }

  // Subcarpetas
  for(const sub of subcarpetas){
    const subNorm = sub.name.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim();
    const subTipo = CARPETA_TIPO[subNorm] ? sub.name : null;
    const subItems = await driveScanRecursivo(sub.id, token, sub.name, depth+1);
    resultado = resultado.concat(subItems);
  }

  return resultado;
}

// Sync real con Google Drive — inteligente y recursivo
window.simSync = async function(){
  const emp = empresa();
  if(!emp.driveUrl){ toast('⚠ Primero guarda el link de Drive'); return; }
  const folderId = extractFolderId(emp.driveUrl);
  if(!folderId){ toast('⚠ Link de Drive inválido'); return; }

  // Si no hay token, intentar obtenerlo via reauth silenciosa
  let token = S._googleAccessToken;
  if(!token){
    showSyncIndicator('Solicitando permiso de Drive…');
    token = await requestDriveToken();
    if(!token){
      hideSyncIndicator('Sin acceso a Drive');
      toast('⚠ No se pudo obtener acceso a Drive · Intenta cerrar sesión y volver a entrar');
      return;
    }
  }

  showSyncIndicator('Escaneando carpeta de Drive…');
  DRIVE_EV.length = 0;

  try {
    showSyncIndicator('Leyendo estructura de carpetas…');

    // Escaneo completo recursivo
    let todosLosArchivos;
    try {
      todosLosArchivos = await driveScanRecursivo(folderId, token, '', 0);
    } catch(scanErr) {
      // Si es 401/403 el token venció — reauth y reintento automático
      if(scanErr.message.includes('Token expirado') || scanErr.message.includes('Sin permiso')){
        showSyncIndicator('Token vencido · Renovando acceso…');
        token = await requestDriveToken();
        if(!token) throw new Error('No se pudo renovar el acceso a Drive');
        todosLosArchivos = await driveScanRecursivo(folderId, token, '', 0);
      } else {
        throw scanErr;
      }
    }

    if(todosLosArchivos.length === 0){
      hideSyncIndicator();
      DRIVE_EV.push({ id:Date.now(), tipo:'info', title:'Carpeta vacía o sin archivos reconocidos',
        detail:'No se encontraron archivos PDF, Word, Excel o PowerPoint en la carpeta ni sus subcarpetas. Verifica que la carpeta compartida tiene archivos.', accion:null });
      render(); toast('⚠ Sin archivos encontrados en Drive'); return;
    }

    showSyncIndicator(`Clasificando ${todosLosArchivos.length} archivo(s)…`);

    // Agrupar por tipo inferido para mostrar resumen
    const porTipo = { POE:[], Formato:[], Instructivo:[] };
    todosLosArchivos.forEach(({archivo, tipo, carpetaNombre}) => {
      if(!porTipo[tipo]) porTipo[tipo]=[];
      porTipo[tipo].push({archivo, carpetaNombre});
    });

    let nuevos=0, modificados=0, sinCambios=0;

    // Procesar cada archivo
    for(const {archivo, tipo, carpetaNombre} of todosLosArchivos){
      const parsed = parseFileName(archivo.name);
      const driveModDate = new Date(archivo.modifiedTime);
      const driveModISO = driveModDate.toISOString().slice(0,10);

      // Buscar existente por código o por driveId
      const existing = DOCUMENTOS.find(d =>
        d.e===S.emp && (d.driveId===archivo.id || (parsed.codigo && d.codigo===parsed.codigo))
      );

      if(!existing){
        // Calcular fecha de revisión estimada (2 años desde última modificación)
        const rev = new Date(driveModDate.getTime() + 365*2*24*3600*1000).toISOString().slice(0,10);
        const area = carpetaNombre && !['poes','formatos','instructivos'].includes(carpetaNombre.toLowerCase())
          ? carpetaNombre : 'Calidad';
        const newDoc = {
          id: 'drive_'+archivo.id,
          e: S.emp,
          codigo: parsed.codigo,
          nombre: parsed.nombre || parsed.codigo,
          tipo,
          area,
          version: parsed.version,
          rev,
          driveId: archivo.id,
          driveMod: driveModISO,
          driveNombreOriginal: archivo.name,
          driveCarpeta: carpetaNombre
        };
        DOCUMENTOS.push(newDoc);
        if(FB_UID) fbSave('documentos', newDoc);
        DRIVE_EV.unshift({
          id: Date.now()+Math.random(),
          tipo:'new',
          title:`${parsed.codigo} — ${parsed.nombre||parsed.codigo}`,
          detail:`📁 ${carpetaNombre||'Raíz'} → clasificado como ${tipo} · v${parsed.version} · ${fLocal(driveModISO)}`,
          accion: null
        });
        nuevos++;
      } else {
        if(existing.driveMod && driveModISO > existing.driveMod){
          DRIVE_EV.unshift({
            id: Date.now()+Math.random(),
            tipo:'changed',
            title:`${existing.codigo} — ${existing.nombre}`,
            detail:`Modificado en Drive el ${fLocal(driveModISO)} · v${existing.version} indexada · Pendiente confirmar`,
            accion:'Revisar y confirmar',
            docId: existing.id,
            newDriveMod: driveModISO,
            driveFileId: archivo.id
          });
          modificados++;
        } else {
          sinCambios++;
        }
        if(!existing.driveId){ existing.driveId=archivo.id; existing.driveMod=driveModISO; if(FB_UID) fbSave('documentos',existing); }
      }
    }

    // Resumen de clasificación por tipo
    const resumenTipos = Object.entries(porTipo)
      .filter(([,arr])=>arr.length)
      .map(([tipo,arr])=>`${arr.length} ${tipo==='POE'?'POE(s)':tipo==='Formato'?'Formato(s)':'Instructivo(s)'}`)
      .join(', ');

    if(resumenTipos){
      DRIVE_EV.push({
        id: Date.now()+Math.random(),
        tipo:'info',
        title:`Clasificación automática completada`,
        detail:`Detectados: ${resumenTipos} · Archivos sin subcarpetas exactas fueron clasificados por prefijo de código y nombre`,
        accion: null
      });
    }

    hideSyncIndicator();
    emp.lastSync = new Date().toISOString();
    if(FB_UID) fbSyncAll();
    render();

    const resumen = [nuevos&&`${nuevos} nuevo(s)`, modificados&&`${modificados} modificado(s)`, sinCambios&&`${sinCambios} sin cambios`].filter(Boolean).join(' · ');
    toast(`Sync Drive completo · ${resumen||'Sin cambios'} ✓`);

  } catch(e){
    hideSyncIndicator('Error: '+e.message);
    console.error('Drive sync error:', e);
    toast('⚠ Error Drive: ' + e.message);
  }
};

/* ===== EXPORTAR ===== */
function exportarResumen(){
  const emp=empresa();
  const docs=DOCUMENTOS.filter(d=>d.e===S.emp);
  const caps=CAPS.filter(c=>c.e===S.emp);
  const insp=INSP.filter(i=>i.e===S.emp);
  const lotes=LOTES.filter(l=>l.e===S.emp);
  const hoy=new Date().toLocaleDateString('es-PE',{year:'numeric',month:'long',day:'numeric'});
  let txt=`REPORTE BPA - ${emp.nombre}\n`;
  txt+=`RUC: ${emp.ruc}\n`;
  txt+=`Generado: ${hoy}\n`;
  txt+='='.repeat(50)+'\n\n';

  txt+='DOCUMENTOS\n';
  txt+='-'.repeat(30)+'\n';
  docs.forEach(d=>{txt+=`[${edoc(d).toUpperCase()}] ${d.codigo} v${d.version} - ${d.nombre} (Rev: ${d.rev})\n`;});
  txt+=`\nTotal: ${docs.length} | Vencidos: ${docs.filter(d=>edoc(d)==='vencido').length} | Por vencer: ${docs.filter(d=>edoc(d)==='por_vencer').length}\n\n`;

  txt+='CAPACITACIONES 2026\n';
  txt+='-'.repeat(30)+'\n';
  caps.forEach(c=>{txt+=`[${ecap(c).toUpperCase()}] ${c.tema} - ${c.area} - ${c.fecha}${c.asist?' | Asistentes: '+c.asist:''}\n`;});
  txt+=`\nTotal: ${caps.length} | Realizadas: ${caps.filter(c=>ecap(c)==='realizada').length}\n\n`;

  txt+='AUTOINSPECCIONES\n';
  txt+='-'.repeat(30)+'\n';
  insp.forEach(i=>{txt+=`[${i.real?'REALIZADA':'PENDIENTE'}] ${i.area} - Prog: ${i.prog}${i.real?' | Real: '+i.real:''} | Hallazgos: ${i.hall}${i.hallDesc?' - '+i.hallDesc:''}\n`;});
  txt+=`\nTotal: ${insp.length} | Realizadas: ${insp.filter(i=>i.real).length}\n\n`;

  txt+='LOTES Y PRODUCTOS\n';
  txt+='-'.repeat(30)+'\n';
  lotes.forEach(l=>{const rs=rsState(l.vigRS);txt+=`[${l.est.toUpperCase()}] ${l.lote} - ${l.prod} | RS: ${l.rs} (${rs.txt}) | Ingreso: ${l.ing}\n  Prov: ${l.prov} → Cli: ${l.cli}\n`;});

  const blob=new Blob([txt],{type:'text/plain;charset=utf-8'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`BPA_${emp.nombre.replace(/\s+/g,'_')}_${new Date().toISOString().slice(0,10)}.txt`;
  a.click();URL.revokeObjectURL(a.href);
  toast('Reporte exportado ✓');
}

/* ===== FIREBASE: PERSISTENCIA ===== */

let FB_UID = null;

// Colección base del usuario
const userCol = (sub) => {
  if(!FB_UID) return null;
  return db.collection('users').doc(FB_UID).collection(sub);
};
const userDoc = (sub, id) => {
  if(!FB_UID) return null;
  return db.collection('users').doc(FB_UID).collection(sub).doc(String(id));
};

// Guardar un ítem en Firestore
async function fbSave(colName, item) {
  if(!FB_UID) return;
  try {
    await userDoc(colName, item.id).set(item);
  } catch(e) { console.error('fbSave error', e); }
}

// Eliminar un ítem en Firestore
async function fbDelete(colName, id) {
  if(!FB_UID) return;
  try {
    await userDoc(colName, String(id)).delete();
  } catch(e) { console.error('fbDelete error', e); }
}

// Cargar toda una colección
async function fbLoad(colName) {
  if(!FB_UID) return [];
  try {
    const snap = await userCol(colName).get();
    return snap.docs.map(d => d.data());
  } catch(e) { console.error('fbLoad error', e); return []; }
}

// Guardar datos de empresa (settings del usuario)
async function fbSaveSettings() {
  if(!FB_UID) return;
  try {
    await db.collection('users').doc(FB_UID).collection('_meta').doc('settings').set({
      emp: S.emp,
      empresas: EMPRESAS
    });
  } catch(e) { console.error('fbSaveSettings', e); }
}

// Cargar toda la data desde Firestore
async function fbLoadAll() {
  showSyncIndicator('Cargando datos…');
  try {
    const [docs, caps, insp, lotes, meta] = await Promise.all([
      fbLoad('documentos'),
      fbLoad('capacitaciones'),
      fbLoad('inspecciones'),
      fbLoad('lotes'),
      (async()=>{ try{ const s=await db.collection('users').doc(FB_UID).collection('_meta').doc('settings').get(); return s.exists?s.data():null; }catch(e){return null;} })()
    ]);

    if(docs.length)   { DOCUMENTOS.length=0; docs.forEach(d=>DOCUMENTOS.push(d)); }
    if(caps.length)   { CAPS.length=0;       caps.forEach(d=>CAPS.push(d)); }
    if(insp.length)   { INSP.length=0;       insp.forEach(d=>INSP.push(d)); }
    if(lotes.length)  { LOTES.length=0;      lotes.forEach(d=>LOTES.push(d)); }
    if(meta) {
      if(meta.emp) S.emp = meta.emp;
      if(meta.empresas && meta.empresas.length) {
        EMPRESAS.length=0;
        meta.empresas.forEach(e=>EMPRESAS.push(e));
      }
    }
    hideSyncIndicator();
    render();
  } catch(e) {
    console.error('fbLoadAll error', e);
    hideSyncIndicator('Error al cargar');
    render();
  }
}

// Indicador de sync
function showSyncIndicator(msg) {
  let el = document.getElementById('syncBar');
  if(!el) { el=document.createElement('div'); el.id='syncBar'; document.body.appendChild(el); }
  el.textContent = '⟳ ' + msg;
  el.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:999;background:var(--teal);color:#fff;font-size:12px;font-weight:700;text-align:center;padding:6px;';
}
function hideSyncIndicator(err) {
  const el=document.getElementById('syncBar');
  if(!el) return;
  if(err) { el.textContent='⚠ '+err; el.style.background='var(--ro-d)'; setTimeout(()=>el.remove(),3000); }
  else el.remove();
}

}

function destroyLogin() {
  const ls=document.getElementById('loginScreen');
  if(ls) ls.remove();
  document.getElementById('appRoot').style.display='flex';
}

/* ===== SYNC AUTOMÁTICO CON FIRESTORE ===== */
let _syncing = false;

window.fbSyncAll = async function() {
  if(!FB_UID || _syncing) return;
  _syncing = true;
  try {
    await Promise.all([
      ...DOCUMENTOS.filter(d=>d.e===S.emp).map(d=>fbSave('documentos',d)),
      ...CAPS.filter(d=>d.e===S.emp).map(d=>fbSave('capacitaciones',d)),
      ...INSP.filter(d=>d.e===S.emp).map(d=>fbSave('inspecciones',d)),
      ...LOTES.filter(d=>d.e===S.emp).map(d=>fbSave('lotes',d)),
    ]);
    await fbSaveSettings();
  } finally { _syncing = false; }
};

/* ===== PATCH MODALES: auto-sync al guardar ===== */
// Interceptamos toast para detectar guardados exitosos
const _origToast = toast;
window.toast = function(msg) {
  _origToast(msg);
  if(msg.includes('✓') || msg.includes('actualizado') || msg.includes('guardado') || msg.includes('registrado') || msg.includes('eliminado') || msg.includes('liberado') || msg.includes('rechazado') || msg.includes('realizada') || msg.includes('agregad')) {
    fbSyncAll();
  }
};

/* ===== BARRA DE USUARIO (header desktop + móvil) ===== */
function renderUserBar(user) {
  // Añadir botón de usuario/logout en sidebar desktop
  let ub = document.getElementById('userBar');
  if(!ub) {
    ub = document.createElement('div');
    ub.id = 'userBar';
    ub.style.cssText = 'padding:10px 12px;border-top:1px solid var(--border);margin-top:auto;display:flex;align-items:center;gap:8px;background:var(--bg-surface);';
    document.querySelector('.sidebar')?.appendChild(ub);
  }
  ub.innerHTML = `
    <img src="${user.photoURL||''}" style="width:28px;height:28px;border-radius:50%;object-fit:cover;flex-shrink:0" onerror="this.style.display='none'">
    <div style="flex:1;min-width:0">
      <div style="font-size:11.5px;font-weight:700;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${user.displayName||'Usuario'}</div>
      <div style="font-size:10px;color:var(--t4);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${user.email||''}</div>
    </div>
    <button id="btnLogout" title="Cerrar sesión" style="background:none;border:none;cursor:pointer;color:var(--t4);font-size:14px;padding:4px;border-radius:6px;" onclick="fbLogout()">⏏</button>
  `;
}

/* User bottom sheet (mobile) */
function openUserSheet(){
  const user = auth.currentUser;
  if(!user){ toast('No hay sesión activa'); return; }
  openModal(`
    <div class="modal-handle"></div>
    <div class="modal-head">
      <span class="modal-title">Mi cuenta</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" style="display:flex;flex-direction:column;align-items:center;gap:12px;padding:24px 18px">
      <img src="${user.photoURL||''}" style="width:64px;height:64px;border-radius:50%;object-fit:cover;border:3px solid var(--teal)" onerror="this.style.display='none'">
      <div style="text-align:center">
        <div style="font-size:16px;font-weight:700;color:var(--t1)">${user.displayName||'Usuario'}</div>
        <div style="font-size:12px;color:var(--t3);margin-top:2px">${user.email||''}</div>
      </div>
      <div style="width:100%;height:1px;background:var(--border)"></div>
      <div style="width:100%;font-size:12px;color:var(--t3);text-align:center">
        Datos sincronizados con Firebase · todos los dispositivos
      </div>
      <button onclick="closeModal();setTimeout(fbLogout,100)" style="width:100%;padding:12px;border-radius:10px;border:1px solid var(--ro-t);background:none;color:var(--ro-t);font-size:14px;font-weight:600;cursor:pointer">
        ⏏ Cerrar sesión
      </button>
    </div>
  `);
}
window.openUserSheet = openUserSheet;

window.fbLogout = async function() {
  await auth.signOut();
};

/* ===== AUTH STATE ===== */
// Redirect result handled by auth.getRedirectResult() call below

auth.onAuthStateChanged( async (user) => {
  if(user) {
    FB_UID = user.uid;
    destroyLogin();
    renderUserBar(user);
    await fbLoadAll();
    // Cargar token cacheado de Drive si existe
    loadDriveToken();
    // Si venimos de un redirect para Drive, disparar sync automáticamente
    if(window._pendingDriveSync){ window._pendingDriveSync=false; setTimeout(()=>simSync(),800); }
  } else {
    FB_UID = null;
    document.getElementById('userBar')?.remove();
    renderLogin();
  }
});

/* ===== INIT ===== */
window.addEventListener('resize', render);

/* ===== PWA SERVICE WORKER ===== */
if('serviceWorker' in navigator){
  const swCode = `
    const CACHE = 'bpa-beast-v3';
    const SKIP = ['firebasestorage','firebaseapp','googleapis','gstatic','firebaseio'];
    self.addEventListener('install', e => {
      self.skipWaiting();
      e.waitUntil(caches.open(CACHE).then(cache => cache.addAll([location.pathname])));
    });
    self.addEventListener('activate', e => { e.waitUntil(self.clients.claim()); });
    self.addEventListener('fetch', e => {
      if(SKIP.some(u => e.request.url.includes(u))) return;
      e.respondWith(
        fetch(e.request).then(res => {
          const clone = res.clone();
          caches.open(CACHE).then(cache => cache.put(e.request, clone));
          return res;
        }).catch(() => caches.match(e.request))
      );
    });
  `;
  const blob = new Blob([swCode], {type:'text/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
}

/* ===== PWA INSTALL BANNER ===== */
let _deferredPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  _deferredPrompt = e;
  setTimeout(() => {
    if(!_deferredPrompt || document.getElementById('installBanner')) return;
    const banner = document.createElement('div');
    banner.id = 'installBanner';
    banner.style.cssText = 'position:fixed;bottom:calc(env(safe-area-inset-bottom,0px) + 68px);left:12px;right:12px;background:var(--teal);color:#fff;border-radius:14px;padding:12px 14px;display:flex;align-items:center;gap:10px;z-index:300;box-shadow:0 4px 20px rgba(0,0,0,.3);';
    banner.innerHTML = `<span style="font-size:22px">💊</span>
      <div style="flex:1;min-width:0">
        <div style="font-size:13px;font-weight:700">Instalar BPA Beast</div>
        <div style="font-size:11px;opacity:.85">Accede desde tu pantalla de inicio</div>
      </div>
      <button id="btnInstallYes" style="background:#fff;color:var(--teal);border:none;border-radius:8px;padding:6px 12px;font-size:12px;font-weight:700;cursor:pointer">Instalar</button>
      <button id="btnInstallNo" style="background:none;border:none;color:#fff;font-size:20px;cursor:pointer;line-height:1">✕</button>`;
    document.body.appendChild(banner);
    document.getElementById('btnInstallYes').addEventListener('click', async () => {
      _deferredPrompt.prompt();
      await _deferredPrompt.userChoice;
      _deferredPrompt = null; banner.remove();
    });
    document.getElementById('btnInstallNo').addEventListener('click', () => {
      banner.remove(); _deferredPrompt = null;
    });
  }, 3000);
});

<script>
/* Handle redirect result when page reloads after Google auth.
   Called once on page load — onAuthStateChanged handles the UI transition. */
auth.getRedirectResult().then(function(result) {
  if (result && result.user) {
    captureGoogleToken(result);
    // Si el redirect fue para obtener token de Drive, guardarlo y continuar con sync
    if(result.credential && result.credential.accessToken){
      saveDriveToken(result.credential.accessToken, 3600);
    }
    if(sessionStorage.getItem('bpa_pending_drive_sync')){
      sessionStorage.removeItem('bpa_pending_drive_sync');
      // El sync se dispara después de que onAuthStateChanged termine de cargar datos
      window._pendingDriveSync = true;
    }
    console.log('Redirect sign-in OK:', result.user.email);
  }
}).catch(function(e) {
  const ignorable = ['auth/no-current-user', 'auth/null-user'];
  if (!ignorable.includes(e.code)) {
    const err = document.getElementById('lsError');
    if (err) { err.textContent = '⚠ ' + e.message; err.style.display = 'block'; }
    const btn = document.getElementById('btnGoogleLogin');
    if (btn) { btn.disabled = false; btn.style.opacity = '1'; }
    const txt = document.getElementById('lsBtnText');
    if (txt) txt.textContent = 'Continuar con Google';
  }
});
</script>
