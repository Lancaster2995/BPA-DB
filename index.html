<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>BPA Beast</title>
<meta name="application-name" content="BPA Beast">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="BPA Beast">
<meta name="theme-color" content="#0d7d72">
<link rel="apple-touch-icon" href="./apple-touch-icon.png">
<link rel="manifest" href="./manifest.json">
<style>
/* ======== TOKENS ======== */
:root{
  --bg-app:#f8fafc; --bg-surface:#fff; --bg-surface2:#f1f5f9; --bg-surface3:#e2e8f0;
  --border:#e2e8f0; --border-strong:#cbd5e1;
  --t1:#0f172a; --t2:#334155; --t3:#64748b; --t4:#94a3b8;
  --teal:#0d7d72; --teal-d:#0a6359; --teal-bg:#ecf7f5;
  --em-bg:#ecfdf5; --em-t:#047857; --em-d:#10b981;
  --am-bg:#fffbeb; --am-t:#b45309; --am-d:#f59e0b;
  --ro-bg:#fff1f2; --ro-t:#be123c; --ro-d:#f43f5e;
  --pill-on:#0f172a; --pill-on-t:#fff;
  --tr-track:#cbd5e1; --tr-thumb:#fff;
  --radius:14px;
}
body.dark{
  --bg-app:#0d1117; --bg-surface:#161b22; --bg-surface2:#1c2330; --bg-surface3:#21262d;
  --border:#30363d; --border-strong:#444c56;
  --t1:#e6edf3; --t2:#c9d1d9; --t3:#8b949e; --t4:#3d444d;
  --teal:#2dd4bf; --teal-d:#14b8a6; --teal-bg:#0d2624;
  --em-bg:#0d2e1f; --em-t:#34d399; --em-d:#10b981;
  --am-bg:#2d1f06; --am-t:#fbbf24; --am-d:#f59e0b;
  --ro-bg:#2d0a14; --ro-t:#fb7185; --ro-d:#f43f5e;
  --pill-on:#e6edf3; --pill-on-t:#0d1117;
  --tr-track:#2dd4bf; --tr-thumb:#0d1117;
}

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{margin:0;font-family:'Inter',system-ui,-apple-system,sans-serif;background:var(--bg-app);color:var(--t1);transition:background .2s,color .2s;}
button{font-family:inherit;cursor:pointer;border:none;background:none;padding:0;}
input{font-family:inherit;}

/* ======== LAYOUT ======== */
/* Desktop: sidebar left + main right */
.app{display:flex;height:100vh;width:100%;}
#appRoot{display:none;}
.sidebar{
  width:240px;flex-shrink:0;background:var(--bg-surface);border-right:1px solid var(--border);
  padding:14px;display:flex;flex-direction:column;gap:0;
  transition:width .2s,padding .2s;overflow:hidden;
}
.sidebar.collapsed{width:56px;padding:14px 8px;}
.main{flex:1;overflow-y:auto;padding:24px;}
.bottom-nav{display:none;}/* hidden on desktop */

/* Mobile: full width + bottom nav */
@media(max-width:640px){
  .app{flex-direction:column;}
  .sidebar{display:none !important;}
  .main{padding:16px 14px 80px;height:100%;overflow-y:auto;}
  .bottom-nav{
    display:flex;position:fixed;bottom:0;left:0;right:0;z-index:50;
    background:var(--bg-surface);border-top:1px solid var(--border);
    padding:6px 0 env(safe-area-inset-bottom,6px);
  }
  .bn-item{
    flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
    padding:6px 4px;font-size:9.5px;font-weight:600;color:var(--t4);
    transition:color .15s;
  }
  .bn-item.active{color:var(--teal);}
  .bn-icon{font-size:18px;line-height:1;}
}

/* ======== BRAND + DARK TOGGLE ======== */
.brand{display:flex;align-items:center;justify-content:space-between;gap:6px;padding:0 2px;margin-bottom:16px;}
.brand-text .brand-title{font-size:14px;font-weight:800;letter-spacing:-.02em;color:var(--t1);white-space:nowrap;}
.brand-text .brand-sub{font-size:10px;color:var(--t3);white-space:nowrap;}
body.dark .brand-text .brand-sub{color:var(--t2);}
.brand-right{display:flex;align-items:center;gap:4px;flex-shrink:0;}
/* collapsed: hide text */
.sidebar.collapsed .brand-text,
.sidebar.collapsed .empresa-info,
.sidebar.collapsed .chevron,
.sidebar.collapsed .nav-label,
.sidebar.collapsed .footer-note{display:none;}
.sidebar.collapsed .empresa-btn{justify-content:center;padding:8px;}
.sidebar.collapsed .nav-item{justify-content:center;gap:0;}
.sidebar.collapsed .brand-right{flex-direction:column;}

/* dark toggle */
.dark-toggle{
  position:relative;width:34px;height:19px;border-radius:99px;
  background:var(--tr-track);border:none;cursor:pointer;flex-shrink:0;
  transition:background .2s;
}
.dark-toggle::after{
  content:'';position:absolute;top:2.5px;left:2.5px;
  width:14px;height:14px;border-radius:50%;background:var(--tr-thumb);
  transition:transform .2s;
}
body.dark .dark-toggle::after{transform:translateX(15px);}
.dark-toggle-icon{position:absolute;top:50%;transform:translateY(-50%);font-size:9px;pointer-events:none;}
.dark-toggle-icon.moon{right:3px;} .dark-toggle-icon.sun{left:3px;display:none;}
body.dark .dark-toggle-icon.moon{display:none;} body.dark .dark-toggle-icon.sun{display:block;}

.collapse-btn{
  width:22px;height:22px;border-radius:6px;background:var(--bg-surface2);
  display:flex;align-items:center;justify-content:center;color:var(--t3);font-size:10px;flex-shrink:0;
}

/* ======== MOBILE HEADER ======== */
.mobile-header{
  display:none;align-items:center;justify-content:space-between;
  padding:12px 14px 0;background:var(--bg-surface);border-bottom:1px solid var(--border);
  margin:-16px -14px 16px;padding-bottom:12px;
}
@media(max-width:640px){.mobile-header{display:flex;}}
.mh-left{display:flex;align-items:center;gap:10px;}
.mh-brand{font-size:15px;font-weight:800;letter-spacing:-.02em;color:var(--t1);}
.mh-empresa{font-size:11px;color:var(--t3);}

/* ======== EMPRESA SELECTOR ======== */
.empresa-panel{position:relative;margin-bottom:4px;}
.empresa-btn{
  width:100%;display:flex;align-items:center;gap:8px;
  border:1px solid var(--border);background:var(--bg-surface);
  border-radius:10px;padding:8px 10px;text-align:left;
}
.empresa-btn:hover{border-color:var(--border-strong);}
.empresa-icon{
  width:28px;height:28px;border-radius:7px;background:var(--teal);color:#fff;
  display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;
}
.empresa-info{min-width:0;flex:1;}
.empresa-nombre{font-size:12.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--t1);}
.empresa-ruc{font-size:10.5px;color:var(--t3);}
.chevron{color:var(--t4);font-size:9px;flex-shrink:0;transition:transform .15s;}
.chevron.open{transform:rotate(180deg);}
.empresa-dropdown{
  position:absolute;z-index:40;margin-top:5px;width:100%;
  background:var(--bg-surface);border:1px solid var(--border);border-radius:10px;
  padding:5px;box-shadow:0 10px 30px rgba(0,0,0,.12);display:none;
}
.empresa-dropdown.show{display:block;}
.empresa-opt{
  width:100%;display:flex;align-items:center;gap:7px;padding:7px 9px;
  border-radius:7px;font-size:12.5px;color:var(--t2);
}
.empresa-opt:hover{background:var(--bg-surface2);}
.empresa-opt.active{color:var(--teal);font-weight:600;}
.empresa-divider{height:1px;background:var(--border);margin:5px 0;}
.empresa-add{color:var(--teal);font-weight:500;}

/* ======== NAV ======== */
.nav{flex:1;display:flex;flex-direction:column;gap:1px;margin-top:16px;}
.nav-item{
  width:100%;display:flex;align-items:center;gap:9px;
  padding:8px 10px;border-radius:8px;
  font-size:13px;font-weight:500;color:var(--t3);
}
.nav-item:hover{background:var(--bg-surface2);}
.nav-item.active{background:var(--teal-bg);color:var(--teal);}
.nav-icon{width:16px;text-align:center;flex-shrink:0;}
.footer-note{font-size:10.5px;color:var(--t4);background:var(--bg-surface2);padding:8px 9px;border-radius:8px;line-height:1.4;}

/* ======== SHARED VIEW COMPONENTS ======== */
.view-header{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:18px;}
.view-title{font-size:18px;font-weight:700;letter-spacing:-.01em;line-height:1.2;}
.view-sub{font-size:12px;color:var(--t3);margin-top:3px;line-height:1.4;}

.btn-primary{
  display:flex;align-items:center;gap:5px;background:var(--teal);color:#fff;
  border-radius:9px;padding:9px 13px;font-size:13px;font-weight:600;white-space:nowrap;flex-shrink:0;
}
.btn-primary:hover{background:var(--teal-d);}
.btn-secondary{
  display:flex;align-items:center;gap:5px;background:var(--bg-surface);color:var(--t2);
  border:1px solid var(--border);border-radius:9px;padding:9px 13px;font-size:13px;font-weight:600;white-space:nowrap;
}
.btn-secondary:hover{border-color:var(--border-strong);background:var(--bg-surface2);}

/* badges */
.badge{display:inline-flex;align-items:center;gap:4px;border-radius:99px;padding:4px 9px;font-size:11px;font-weight:700;white-space:nowrap;}
.badge .bdot{width:5px;height:5px;border-radius:50%;flex-shrink:0;}
.badge.vigente,.badge.realizada,.badge.liberado{background:var(--em-bg);color:var(--em-t);}
.badge.vigente .bdot,.badge.realizada .bdot,.badge.liberado .bdot{background:var(--em-d);}
.badge.por_vencer,.badge.cuarentena{background:var(--am-bg);color:var(--am-t);}
.badge.por_vencer .bdot,.badge.cuarentena .bdot{background:var(--am-d);}
.badge.vencido,.badge.vencida,.badge.rechazado{background:var(--ro-bg);color:var(--ro-t);}
.badge.vencido .bdot,.badge.vencida .bdot,.badge.rechazado .bdot{background:var(--ro-d);}
.badge.pendiente{background:var(--bg-surface2);color:var(--t3);}
.badge.pendiente .bdot{background:var(--t4);}

/* pill filters */
.filter-pills{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px;}
.pill{background:var(--bg-surface2);color:var(--t3);border-radius:99px;padding:6px 11px;font-size:11.5px;font-weight:600;}
.pill.active{background:var(--pill-on);color:var(--pill-on-t);}
.pill:hover:not(.active){background:var(--bg-surface3);}

/* search */
.search-wrap{position:relative;margin-bottom:12px;}
.search-wrap input{
  width:100%;border:1px solid var(--border);border-radius:9px;
  padding:10px 12px 10px 34px;font-size:13px;
  background:var(--bg-surface);color:var(--t1);
}
.search-wrap input:focus{outline:none;border-color:var(--teal);box-shadow:0 0 0 3px rgba(13,125,114,.12);}
.search-ico{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--t4);pointer-events:none;}

/* section title */
.section-title{font-size:12px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.04em;margin:22px 0 10px;}

/* ======== DASHBOARD ======== */
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px;}
@media(max-width:400px){.stat-grid{grid-template-columns:1fr 1fr;}}
.stat-card{
  background:var(--bg-surface);border:1px solid var(--border);border-radius:12px;
  padding:12px;cursor:pointer;transition:.15s;text-align:left;
}
.stat-card:hover{border-color:var(--border-strong);}
.stat-icon{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;margin-bottom:8px;background:var(--bg-surface2);color:var(--t3);}
.stat-icon.crit{background:var(--ro-bg);color:var(--ro-t);}
.stat-val{font-size:26px;font-weight:800;color:var(--t1);font-variant-numeric:tabular-nums;}
.stat-val.crit{color:var(--ro-t);}
.stat-label{font-size:11px;font-weight:600;color:var(--t2);margin-top:2px;line-height:1.3;}
.stat-detail{font-size:10.5px;color:var(--t3);margin-top:1px;line-height:1.3;}

/* timeline */
.tl-card{background:var(--bg-surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
.tl-row{display:flex;align-items:center;gap:10px;padding:11px 14px;border-bottom:1px solid var(--border);}
.tl-row:last-child{border-bottom:none;}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.dot.vigente,.dot.realizada{background:var(--em-d);}
.dot.por_vencer{background:var(--am-d);}
.dot.vencido,.dot.vencida{background:var(--ro-d);}
.tl-mid{flex:1;min-width:0;}
.tl-type{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--t4);}
.tl-name{font-size:12.5px;color:var(--t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px;}
.tl-days{font-size:11px;font-weight:700;flex-shrink:0;text-align:right;}
.tl-days.late{color:var(--ro-t);} .tl-days.soon{color:var(--am-t);} .tl-days.ok{color:var(--t4);}

/* ======== DOCUMENT CARDS (mobile-first) ======== */
.doc-card{
  background:var(--bg-surface);border:1px solid var(--border);border-radius:12px;
  padding:13px 14px;margin-bottom:9px;
}
.doc-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;}
.doc-codigo{font-family:ui-monospace,'SF Mono',Consolas,monospace;font-size:11px;color:var(--t3);margin-bottom:3px;}
.doc-nombre{font-size:13.5px;font-weight:600;color:var(--t1);line-height:1.35;}
.doc-meta{display:flex;gap:12px;margin-top:8px;flex-wrap:wrap;}
.doc-meta-item{font-size:11px;color:var(--t3);}
.doc-meta-item strong{color:var(--t2);font-weight:600;}
.doc-foot{margin-top:8px;padding-top:8px;border-top:1px solid var(--border);text-align:right;}
.doc-foot .link-btn{padding:4px 0;}

/* ======== CAPACITACION CARDS ======== */
.progress-card{background:var(--bg-surface);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:18px;}
.progress-top{display:flex;justify-content:space-between;font-size:12px;color:var(--t3);margin-bottom:7px;}
.progress-top strong{color:var(--t2);}
.progress-bar{height:7px;background:var(--bg-surface2);border-radius:99px;overflow:hidden;}
.progress-fill{height:100%;background:var(--teal);border-radius:99px;transition:width .4s;}

.cap-card{background:var(--bg-surface);border:1px solid var(--border);border-radius:12px;padding:13px 14px;margin-bottom:8px;}
.cap-row1{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:6px;}
.cap-icon{font-size:16px;flex-shrink:0;margin-top:1px;}
.cap-icon.ok{color:var(--em-d);} .cap-icon.bad{color:var(--ro-d);} .cap-icon.pend{color:var(--t4);}
.cap-name{font-size:13.5px;font-weight:600;color:var(--t1);line-height:1.3;flex:1;min-width:0;}
.cap-meta{font-size:11px;color:var(--t3);margin-top:2px;}
.cap-row2{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px;border-top:1px solid var(--border);padding-top:8px;margin-top:4px;}
.cap-row3{margin-top:6px;text-align:right;}
.cap-row3 .link-btn{padding:4px 0;}
.cap-fecha{font-size:11.5px;color:var(--t3);}
.cap-dias{font-size:11.5px;font-weight:700;}
.cap-dias.late{color:var(--ro-t);} .cap-dias.soon{color:var(--am-t);} .cap-dias.ok{color:var(--t4);}

/* ======== AUTOINSPECCIÓN CARDS ======== */
.insp-card{background:var(--bg-surface);border:1px solid var(--border);border-radius:12px;padding:13px 14px;margin-bottom:9px;}
.insp-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;}
.insp-area{font-size:13.5px;font-weight:600;color:var(--t1);line-height:1.3;}
.insp-meta{font-size:11px;color:var(--t3);margin-top:3px;line-height:1.5;}
.insp-footer{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;border-top:1px solid var(--border);margin-top:11px;padding-top:11px;}
.hallazgo{display:flex;align-items:center;gap:4px;background:var(--am-bg);color:var(--am-t);border-radius:99px;padding:4px 9px;font-size:11px;font-weight:700;}

/* ======== PRODUCTO CARDS ======== */











@media(max-width:380px){}

.trace-label{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--t4);margin-bottom:3px;}
.trace-name{font-size:12px;font-weight:600;color:var(--t1);line-height:1.3;}
.trace-dir{font-size:10.5px;color:var(--t3);margin-top:2px;line-height:1.3;}




/* ======== DRIVE SYNC ======== */
.drive-config{background:var(--bg-surface);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:14px;}
.drive-config h3{font-size:13.5px;font-weight:700;color:var(--t1);margin:0 0 4px;}
.drive-config .desc{font-size:12px;color:var(--t3);margin:0 0 12px;line-height:1.5;}
.drive-input{display:flex;gap:8px;margin-bottom:8px;}
.drive-input input{flex:1;border:1px solid var(--border);border-radius:8px;padding:9px 11px;font-size:12px;background:var(--bg-surface2);color:var(--t2);}
.drive-status{display:flex;align-items:center;gap:7px;font-size:11.5px;color:var(--t3);padding:8px 10px;background:var(--bg-surface2);border-radius:8px;}
.ok-dot{width:6px;height:6px;border-radius:50%;background:var(--em-d);flex-shrink:0;}
.drive-tree{font-size:12px;color:var(--t2);margin-top:12px;line-height:1.9;}
.drive-tree .fold{font-weight:700;color:var(--t1);}
.drive-tree .ind{padding-left:16px;color:var(--t3);}
.drive-tree .cnt{color:var(--t4);font-size:10.5px;}
.rule-box{background:var(--bg-surface2);border:1px solid var(--border);border-radius:9px;padding:14px 16px;margin-top:12px;}
.rule-box .rtitle{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;color:var(--t4);margin-bottom:8px;gap:10px;flex-wrap:wrap;row-gap:6px;}
.rule-box .rtitle>span{min-width:0;overflow-wrap:break-word;}
.rule-box .rtitle .link-btn{flex-shrink:0;}
.rule-box code{font-family:ui-monospace,'SF Mono',monospace;font-size:11px;background:var(--bg-app);border:1px solid var(--border);padding:2px 5px;border-radius:4px;color:var(--teal);}
.rule-box p{font-size:11.5px;color:var(--t2);margin:5px 0 0;line-height:1.6;}
.rule-box .btn-secondary{margin-top:10px;}

.sync-feed{background:var(--bg-surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
.sf-header{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.sf-header h3{margin:0;font-size:13.5px;font-weight:700;color:var(--t1);}
.sf-count{font-size:11px;color:var(--t4);}
.sf-row{display:flex;gap:10px;padding:12px 14px;border-bottom:1px solid var(--border);}
.sf-row:last-child{border-bottom:none;}
.sf-icon{width:26px;height:26px;border-radius:7px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;}
.fold-group{margin:4px 0;}
.root-fold{font-weight:800;font-size:13px;color:var(--t1);}
.ind-file{display:flex;align-items:center;gap:6px;padding:3px 0 3px 18px;font-size:11.5px;border-bottom:1px solid var(--border);flex-wrap:nowrap;}
.ind-file:last-child{border-bottom:none;}
.ind-code{font-weight:700;color:var(--teal);white-space:nowrap;min-width:80px;}
.ind-name{color:var(--t2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.ind-ver{color:var(--t4);font-size:10.5px;white-space:nowrap;}
.ind-link{color:var(--teal);text-decoration:none;font-size:12px;padding:2px 4px;border-radius:4px;}
.ind-link:hover{background:var(--teal-bg);}

.sf-icon.changed{background:var(--am-bg);color:var(--am-t);}
.sf-icon.confirmed{background:var(--em-bg);color:var(--em-t);}
.sf-icon.info{background:var(--bg-surface2);color:var(--t3);}
.sf-body{flex:1;min-width:0;}
.sf-title{font-size:12.5px;font-weight:600;color:var(--t1);line-height:1.3;}
.sf-detail{font-size:11px;color:var(--t3);margin-top:2px;line-height:1.4;}
.sf-action{flex-shrink:0;}
.link-btn{color:var(--teal);font-size:11.5px;font-weight:700;padding:5px 8px;border-radius:6px;}
.link-btn:hover{background:var(--teal-bg);}

/* ======== EMPRESA SHEET (mobile) ======== */
.sheet-overlay{
  display:none;position:fixed;inset:0;z-index:60;
  background:rgba(0,0,0,.45);backdrop-filter:blur(2px);
}
.sheet-overlay.show{display:block;}
.sheet{

const HOY = new Date(); HOY.setHours(0,0,0,0);

// Histórico de nombres usados en "Capacitador" y "Capacitados", para autocompletar
// en futuros ingresos. Se persiste junto a las settings del usuario.
const CAPACITADORES_HISTORICO = [];
const CAPACITADOS_HISTORICO = [];
// Agrega nombre(s) al histórico (sin duplicar) — acepta un string con varios nombres
// separados por coma/línea, o un solo nombre.
function registrarEnHistorico(arr, texto){
  if(!texto) return;
  String(texto).split(/[,\n]/).map(s=>s.trim()).filter(Boolean).forEach(nombre=>{
    if(!arr.some(x=>x.toLowerCase()===nombre.toLowerCase())) arr.push(nombre);
  });
}

}

/* --- Filas dinámicas para "Capacitados": un input por persona + botón eliminar por fila --- */
// Crea una fila (input + botón quitar) dentro de wrap, con valor inicial opcional.
function addCapacitadoRow(wrap, valor=''){
  const row = document.createElement('div');
  row.className = 'capacitado-row';
  row.style.cssText = 'display:flex;gap:6px;margin-bottom:6px;';
  row.innerHTML = `
    <input class="capacitado-input" list="dlCapacitados" placeholder="Nombre del capacitado" autocomplete="off"
      style="flex:1;border:1px solid var(--border);border-radius:8px;padding:9px 11px;font-size:13px;background:var(--bg-surface2);color:var(--t1);min-width:0;" value="${valor.replace(/"/g,'&quot;')}">
    <button type="button" class="btn-secondary capacitado-del" style="flex-shrink:0;padding:6px 10px" title="Quitar">✕</button>`;
  row.querySelector('.capacitado-del').addEventListener('click',()=>{
    // nunca dejar el wrap totalmente vacío — si es la única fila, solo limpiarla
    if(wrap.children.length>1) row.remove();
    else row.querySelector('.capacitado-input').value='';
  });
  wrap.appendChild(row);
}
// Inicializa wrap con una fila por cada valor del array (al menos una fila vacía)
function bindCapacitadosWrap(wrap, valores){
  wrap.innerHTML='';
  (valores.length?valores:['']).forEach(v=>addCapacitadoRow(wrap, v));
}

}

/* ===== HELPERS ===== */
const dias=(f)=>Math.ceil((new Date(f)-HOY)/864e5);

/* ===== CRITERIOS DE CLASIFICACIÓN (Drive + Documentos) ===== */
const CRITERIOS_DEFAULT = ['POEs','Formatos','Instructivos','Registros','Manuales'];
const MISC_LABEL = 'MISC';

function normTxt(s){
  return (s||'').toString().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim();
}
// quita 's' final simple para comparar singular/plural (POEs vs POE)
function stemTxt(s){ const n=normTxt(s); return n.endsWith('s') ? n.slice(0,-1) : n; }

function getCriterios(emp){
  emp = emp || empresa();
  return (emp.driveCriterios && emp.driveCriterios.length) ? emp.driveCriterios : CRITERIOS_DEFAULT.slice();

// Sinónimos / prefijos de código conocidos para cada criterio estándar de BPA.
// Permite reconocer un documento como POE/Formato/Instructivo aunque el nombre
// del archivo no empiece literalmente con la palabra del criterio.
const CRITERIO_SINONIMOS = {
  poe:         { palabras:['poe','sop','pnt','pno','procedimiento'], prefijos:['POE','SOP','PNT','PNO','PR','PRO','PROC'] },
  formato:     { palabras:['formato','registro','planilla','fmt'],   prefijos:['FOR','FMT','FO','REG','RG','FORM'] },
  instructivo: { palabras:['instructivo','instruccion','it','manual','guia'], prefijos:['INS','INST','IT','INC','MAN','GUIA','GU'] },
};

// Determina a qué criterio (palabra definida por el usuario: POEs, Formatos, etc.)
// pertenece un nombre de archivo. Acepta cualquier interpretación razonable del texto:
// - coincidencia exacta al inicio (comportamiento original)
// - la palabra del criterio (o su raíz singular/plural) en cualquier parte del nombre
// - prefijos de código conocidos (SOP, PNT, PR, REG, IT, MAN, etc.) en cualquier parte
// - sinónimos habituales en BPA (procedimiento, registro, planilla, manual, guía…)
function clasificarPorCriterio(nombreArchivo, criterios){
  const original = (nombreArchivo||'').replace(/\.[^.]+$/, '');
  const clean = normTxt(original);
  // primer token "tipo código" del nombre, p.ej. "SOP-026", "PNT 014", "REG_005", "REGISTRO 015"
  const primerToken = (original.match(/^[A-Za-zÁÉÍÓÚáéíóúñÑ]+[\s_-]?\d+/)||[''])[0].replace(/[\s_-]/g,'');
  // cualquier token "tipo código" en el nombre completo (para prefijos de código en cualquier parte)
  const tokens = original.match(/[A-Za-zÁÉÍÓÚáéíóúñÑ]+[\s_-]?\d+/g) || [];

  function grupoDe(critStem){
    if(/^poe/.test(critStem) || /^sop/.test(critStem) || /procedimiento/.test(critStem)) return 'poe';
    if(/^formato/.test(critStem) || /^registro/.test(critStem)) return 'formato';
    if(/^instructivo/.test(critStem) || /^manual/.test(critStem) || /^guia/.test(critStem)) return 'instructivo';
    return null;
  }

  // Compara el prefijo de letras de un token (p.ej. "ITC" en "ITC2026") EXACTAMENTE contra la
  // lista de prefijos conocidos — no "empieza con", para que "ITC" no confunda con el prefijo "IT".
  function prefijoExacto(token, prefijos){
    const letras = (token.match(/^[A-Za-zÁÉÍÓÚáéíóúñÑ]+/)||[''])[0].toUpperCase();
    return prefijos.some(pre=>letras===pre.toUpperCase());
  }

  // PASE A (alta confianza): coincidencia al inicio del nombre, o el primer token del nombre
  // calza EXACTAMENTE con un prefijo de código conocido del criterio (SOP-026, REG 015, IT-003…).
  // Esto se evalúa para TODOS los criterios antes de pasar a sinónimos sueltos, así un código
  // claro al inicio del nombre nunca es pisado por una palabra suelta más adelante en el texto.
  for(const crit of criterios){
    const critN = normTxt(crit);
    const critStem = stemTxt(crit);
    if(clean.startsWith(critN) || clean.startsWith(critStem)) return crit;
    const grupo = grupoDe(critStem);
    if(grupo && primerToken){
      const def = CRITERIO_SINONIMOS[grupo];
      if(prefijoExacto(primerToken, def.prefijos)) return crit;
    }
  }

  // PASE B (confianza media): la palabra del criterio (o su raíz) aparece en cualquier parte del nombre.
  for(const crit of criterios){
    const critStem = stemTxt(crit);
    const reCrit = new RegExp(`\\b${critStem}s?\\b`);
    if(reCrit.test(clean)) return crit;
  }

  // PASE C (confianza baja, fallback final): sinónimos habituales en BPA en cualquier parte del
  // texto, o prefijos de código conocidos (coincidencia exacta) en cualquier token, no solo el primero.
  for(const crit of criterios){
    const grupo = grupoDe(stemTxt(crit));
    if(!grupo) continue;
    const def = CRITERIO_SINONIMOS[grupo];
    if(def.palabras.some(p=>new RegExp(`\\b${p}\\b`).test(clean))) return crit;
    if(tokens.some(t=>prefijoExacto(t.replace(/[\s_-]/g,''), def.prefijos))) return crit;
  }
  return MISC_LABEL;
}

// Extrae el primer número que aparece en el nombre de archivo, para ordenar dentro de cada sección.
// Ej: "POE-ALM-002 - Control..." -> 2 ; "Formato 10..." -> 10 ; sin número -> Infinity (va al final)
function numeroEnNombre(nombre){
  const m = (nombre||'').match(/\d+/);
  return m ? parseInt(m[0],10) : Infinity;
}

/* ===== TOAST ===== */
function toast(msg){
  let t=document.getElementById('appToast');
  if(!t){t=document.createElement('div');t.id='appToast';t.className='toast';document.body.appendChild(t);}
  t.textContent=msg;t.classList.add('show');
  clearTimeout(t._tid);t._tid=setTimeout(()=>t.classList.remove('show'),2400);
}

/* ===== MODAL ENGINE ===== */
function openModal(html, onReady){
  let ov=document.getElementById('appModalOv');
  if(!ov){ov=document.createElement('div');ov.id='appModalOv';ov.className='modal-overlay';document.body.appendChild(ov);}
  ov.innerHTML=`<div class="modal">${html}</div>`;
  ov.classList.add('show');
  ov.addEventListener('click',e=>{
    if(e.target!==ov)return;
    const inputs=[...ov.querySelectorAll('input,textarea,select')].filter(i=>i.value&&i.value!==i.defaultValue);
    if(inputs.length>0&&!confirm('¿Cerrar sin guardar cambios?'))return;
    closeModal();
  },{once:true});
  ov.querySelector('.modal-close')?.addEventListener('click',closeModal);
  if(onReady) onReady(ov.querySelector('.modal'));
}
function closeModal(){
  const ov=document.getElementById('appModalOv');
  if(ov){ov.classList.remove('show');ov.innerHTML='';}
}

function modalEditarCriterios(){
  const emp = EMPRESAS.find(x=>x.id===S.emp);
  if(!emp){ toast('⚠ Selecciona una droguería primero'); return; }
  let words = getCriterios(emp).slice();

  function renderList(box){
    box.innerHTML = words.map((w,i)=>`
      <div class="field-row" data-i="${i}" style="display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border);">
        <span style="flex:1;font-size:13px;color:var(--t1)">${w}</span>
        <button class="link-btn crit-del" data-i="${i}" style="color:var(--ro-t)">✕</button>
      </div>`).join('') || `<div style="color:var(--t4);font-size:12px;padding:8px 0">Sin palabras · agrega al menos una</div>`;
    box.querySelectorAll('.crit-del').forEach(b=>b.addEventListener('click',()=>{
      words.splice(parseInt(b.dataset.i,10),1);
      renderList(box);
    }));
  }

  openModal(`
    <div class="modal-handle"></div>
    <div class="modal-head"><span class="modal-title">Criterio de clasificación</span><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div class="modal-body">
      <p style="font-size:12px;color:var(--t3);margin-bottom:10px">Los archivos se agrupan según con qué palabra empieza su nombre. Lo que no calce con ninguna va a <strong>${MISC_LABEL}</strong>.</p>
      <div id="critList"></div>
      <div style="display:flex;gap:8px;margin-top:10px;">
        <input id="critNuevo" placeholder="Nueva palabra…" style="flex:1;border:1px solid var(--border);border-radius:8px;padding:9px 11px;font-size:12px;background:var(--bg-surface2);color:var(--t1);">
        <button class="btn-secondary" id="critAdd" style="flex-shrink:0">+ Agregar</button>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn-primary" id="critSave">Guardar</button>
    </div>`,
  m=>{
    const box = m.querySelector('#critList');
    renderList(box);
    m.querySelector('#critAdd').addEventListener('click',()=>{
      const inp = m.querySelector('#critNuevo');
      const val = inp.value.trim();
      if(!val){ toast('⚠ Escribe una palabra'); return; }
      if(words.some(w=>normTxt(w)===normTxt(val))){ toast('⚠ Esa palabra ya está'); return; }
      words.push(val);
      inp.value='';
      renderList(box);
    });
    m.querySelector('#critSave').addEventListener('click',()=>{
      if(!words.length){ toast('⚠ Agrega al menos una palabra'); return; }
      emp.driveCriterios = words;
      if(FB_UID) fbSaveSettings();
      closeModal();
      render();
      toast('Criterio actualizado ✓');
    });
  });
}

  openModal(`

          const destinoId = await driveGetOrCreateFolder(folderId, criterio);
          const uploaded = await driveUploadFile(destinoId, file);
          const newDoc = { id:'drive_'+uploaded.id, e:S.emp, codigo:cod, nombre:nom, tipo:tipoLegacy, criterio, area, version:ver, rev, driveId:uploaded.id, driveMod:(uploaded.modifiedTime||new Date().toISOString()).slice(0,10), driveNombreOriginal:uploaded.name, driveCarpeta:criterio };
          DOCUMENTOS.push(newDoc);
          if(FB_UID) fbSave('documentos', newDoc);
          closeModal();render();toast('Documento subido a Drive ✓');
        } catch(e){
          btn.disabled=false; btn.textContent=oldTxt;
          toast('⚠ '+e.message);
        }
        return;
      }

      if(!cod){toast('Completa código o adjunta un archivo');return;}
      const newDoc = {id:nextId(),e:S.emp,codigo:cod,nombre:nom,tipo:tipoLegacy,criterio,area,version:ver,rev};
      DOCUMENTOS.push(newDoc);
      if(FB_UID) fbSave('documentos', newDoc);
      closeModal();render();toast('Documento guardado ✓');
    });
  });
}

// Busca en Drive (carpeta del cliente) archivos Word (.doc/.docx) y deja elegir cuál asociar
// como evaluación de la capacitación.
async function buscarEvaluacionEnDrive(c, tipo){
  const emp = empresa();
  if(!emp.driveUrl){ toast('⚠ Primero conecta la carpeta de Drive del cliente'); return; }
  const folderId = extractFolderId(emp.driveUrl);
  if(!folderId){ toast('⚠ Link de Drive inválido'); return; }
  const apiKey = emp.driveApiKey || DRIVE_API_KEY;
  if(!apiKey){ toast('⚠ Configura tu API Key de Drive primero'); return; }
  showSyncIndicator('Buscando evaluaciones en Drive…');
  try {
    const MIME_WORD = ['application/msword','application/vnd.openxmlformats-officedocument.wordprocessingml.document'];
    const todos = await driveBuscarArchivoPorPalabras(folderId, apiKey, /\.docx?$/i, 0, MIME_WORD);
    hideSyncIndicator();
    if(!todos.length){ toast('⚠ No se encontraron archivos Word en la carpeta'); return; }
    openModal(`
      <div class="modal-handle"></div>
      <div class="modal-head"><span class="modal-title">Elige la evaluación</span><button class="modal-close" onclick="closeModal()">✕</button></div>
      <div class="modal-body">
        <p style="font-size:12px;color:var(--t3);margin-bottom:10px">${todos.length} archivo(s) Word encontrados en la carpeta.</p>
        ${todos.map((f,i)=>`
          <button class="sheet-opt" data-fi="${i}" style="width:100%;text-align:left;border:1px solid var(--border);border-radius:10px;margin-bottom:8px;padding:10px 12px;">
            <div style="font-size:13px;font-weight:600;color:var(--t1)">${f.name}</div>

// Busca en Drive (carpeta del cliente) archivos pptx/pdf y deja elegir cuál asociar.
async function buscarDiapositivaEnDrive(c){
  const emp = empresa();
  if(!emp.driveUrl){ toast('⚠ Primero conecta la carpeta de Drive del cliente'); return; }
  const folderId = extractFolderId(emp.driveUrl);
  if(!folderId){ toast('⚠ Link de Drive inválido'); return; }
  const apiKey = emp.driveApiKey || DRIVE_API_KEY;
  if(!apiKey){ toast('⚠ Configura tu API Key de Drive primero'); return; }
  showSyncIndicator('Buscando diapositivas en Drive…');
  try {
    const MIME_DIAPO = ['application/pdf','application/vnd.openxmlformats-officedocument.presentationml.presentation','application/vnd.ms-powerpoint'];
    const todos = await driveBuscarArchivoPorPalabras(folderId, apiKey, /\.(pptx?|pdf)$/i, 0, MIME_DIAPO);
    hideSyncIndicator();
    if(!todos.length){ toast('⚠ No se encontraron archivos PPTX o PDF en la carpeta'); return; }
    openModal(`
      <div class="modal-handle"></div>
      <div class="modal-head"><span class="modal-title">Elige la diapositiva</span><button class="modal-close" onclick="closeModal()">✕</button></div>
      <div class="modal-body">
        <p style="font-size:12px;color:var(--t3);margin-bottom:10px">${todos.length} archivo(s) PPTX/PDF encontrados en la carpeta.</p>
        ${todos.map((f,i)=>`
          <button class="sheet-opt" data-fi="${i}" style="width:100%;text-align:left;border:1px solid var(--border);border-radius:10px;margin-bottom:8px;padding:10px 12px;">
            <div style="font-size:13px;font-weight:600;color:var(--t1)">${f.name}</div>
          </button>`).join('')}
      </div>
      <div class="modal-footer"><button class="btn-secondary" onclick="closeModal()">Cancelar</button></div>`,
    m=>{
      m.querySelectorAll('[data-fi]').forEach(b=>b.addEventListener('click',()=>{
        const f = todos[parseInt(b.dataset.fi,10)];
        closeModal();
        c.diapoDriveId = f.id; c.diapoNombre = f.name; c.diapoMimeType = f.mimeType;
        if(FB_UID) fbSave('capacitaciones', c);
        toast('Diapositiva asociada ✓');
        modalVerCap(c);
      }));
    });
  } catch(e){
    hideSyncIndicator();
    toast('⚠ '+e.message);
  }
}

function vDashboard(){
  const docs=DOCUMENTOS.filter(d=>d.e===S.emp);
  const caps=CAPS.filter(c=>c.e===S.emp);
  const insp=INSP.filter(i=>i.e===S.emp);
  const dV=docs.filter(d=>edoc(d)==='vencido').length;
  const dPV=docs.filter(d=>edoc(d)==='por_vencer').length;
  const cPend=caps.filter(c=>ecap(c)==='pendiente'||ecap(c)==='vencida').length;
  const cV=caps.filter(c=>ecap(c)==='vencida').length;
  const hall=insp.reduce((a,i)=>a+i.hall,0);
  const proxI=insp.filter(i=>!i.real).sort((a,b)=>new Date(a.prog)-new Date(b.prog))[0];
  const evs=[
    ...docs.map(d=>({tipo:"Documento",nombre:`${d.codigo} · ${d.nombre}`,fecha:d.rev,est:edoc(d)})),
    ...caps.filter(c=>ecap(c)!=='realizada').map(c=>({tipo:"Capacitación",nombre:c.tema,fecha:c.fecha,est:ecap(c)==='vencida'?'vencido':dias(c.fecha)<=30?'por_vencer':'vigente'})),
    ...insp.filter(i=>!i.real).map(i=>({tipo:"Inspección",nombre:i.area,fecha:i.prog,est:dias(i.prog)<0?'vencido':dias(i.prog)<=30?'por_vencer':'vigente'})),
  ].sort((a,b)=>new Date(a.fecha)-new Date(b.fecha));
  return`
    <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px">

        <div class="stat-detail">${dPV} por vencer</div>

      <button class="stat-card" data-goto="capacitaciones">
        <div class="stat-icon ${cV>0?'crit':''}">◉</div>
        <div class="stat-val ${cV>0?'crit':''}">${cPend}</div>
        <div class="stat-label">Capacit. pendientes</div>
        <div class="stat-detail">${cV} vencidas</div>
      </button>
      <button class="stat-card" data-goto="autoinspecciones">
        <div class="stat-icon ${hall>0?'crit':''}">✓</div>
        <div class="stat-val ${hall>0?'crit':''}">${hall}</div>
        <div class="stat-label">Hallazgos abiertos</div>
        <div class="stat-detail">${proxI?proxI.area:'Al día'}</div>
      </button>
    </div>
    <div class="section-title">Próximos vencimientos</div>
    <div class="tl-card">
      ${evs.slice(0,8).map(e=>{
        const f=fDias(dias(e.fecha));
        return`<div class="tl-row">
          <span class="dot ${e.est}"></span>
          <div class="tl-mid">
            <div class="tl-type">${e.tipo}</div>
            <div class="tl-name">${e.nombre}</div>
          </div>
          <div class="tl-days ${f.cls}">${f.txt}</div>
        </div>`;
      }).join('')}
    </div>`;
}

function vDocumentos(){
  let docs=DOCUMENTOS.filter(d=>d.e===S.emp);
  if(S.qDoc){const q=S.qDoc.toLowerCase();docs=docs.filter(d=>(d.codigo+d.nombre).toLowerCase().includes(q));}

  const emp = empresa();
  const criterios = getCriterios(emp);
  const todasCategorias = [...criterios, MISC_LABEL];
  const grupos = {};
  criterios.forEach(c=>grupos[c]=[]);
  grupos[MISC_LABEL]=[];
  docs.forEach(d=>{
    const c = (d.driveNombreOriginal||d.nombre) ? clasificarPorCriterio(d.driveNombreOriginal||d.nombre, criterios) : (d.criterio||MISC_LABEL);
    (grupos[c]||(grupos[c]=[])).push(d);
  });
  // orden por número detectado en el nombre/código dentro de cada sección
  Object.values(grupos).forEach(arr=>arr.sort((a,b)=>{
    const na=numeroEnNombre(a.driveNombreOriginal||a.codigo||a.nombre);
    const nb=numeroEnNombre(b.driveNombreOriginal||b.codigo||b.nombre);
    if(na!==nb) return na-nb;
    return (a.codigo||'').localeCompare(b.codigo||'');
  }));

  const categoriasAMostrar = S.filtCriterio==='todos' ? todasCategorias : [S.filtCriterio];

  function seccion(nombre, lista){

          <span class="doc-meta-item"><strong>Tipo</strong> ${d.tipo}</span>
          <span class="doc-meta-item"><strong>Rev.</strong> ${fLocal(d.rev)}</span>
        </div>
        ${d.driveId?`<div class="doc-foot"><a class="link-btn" href="https://drive.google.com/file/d/${d.driveId}/view" target="_blank" onclick="event.stopPropagation()">Abrir y editar ↗</a></div>`:''}
      </div>`).join('')}
    </div>`;
  }

  const huboResultados = categoriasAMostrar.some(c=>(grupos[c]||[]).length>0);

  return`
    <div class="view-header">
      <div><div class="view-title">Documentos</div></div>
      <button class="btn-primary" onclick="modalNuevoDoc()">+ Nuevo</button>
    </div>
    <div class="filter-pills" id="critFiltPills">
      <button class="pill ${S.filtCriterio==='todos'?'active':''}" data-critf="todos">Todos</button>
      ${todasCategorias.map(c=>
        `<button class="pill ${S.filtCriterio===c?'active':''}" data-critf="${c}">${c} <span style="opacity:.6">${(grupos[c]||[]).length}</span></button>`

    <div class="search-wrap"><span class="search-ico">⌕</span>

      ? categoriasAMostrar.map(c=>seccion(c, grupos[c]||[])).join('')

/* ===== GOOGLE DRIVE REAL API ===== */

// Extrae el folder ID del link de Drive
function extractFolderId(url){
  const m = url.match(/\/folders\/([a-zA-Z0-9_-]+)/);
  return m ? m[1] : null;
}

// Construye un link de descarga directa para un archivo de Drive a partir de su fileId.
// Funciona para archivos dentro de una carpeta compartida como "cualquiera con el link puede ver".
function driveDownloadLink(fileId){
  return `https://drive.google.com/uc?export=download&id=${fileId}`;
}
// Abre la descarga de un archivo de Drive asociado (diapositiva o evaluación) en una nueva pestaña/tab.
function descargarArchivoDrive(fileId, nombre){
  if(!fileId){ toast('⚠ Este archivo no está vinculado a Drive (se subió solo localmente, sin carpeta conectada)'); return; }
  window.open(driveDownloadLink(fileId), '_blank');
}

// ===== OAUTH DE ESCRITURA (Google Identity Services) =====
// Necesario solo para "Ordenar" (crear carpetas y mover archivos en Drive real).
// El API Key normal (arriba) solo sirve para LEER, nunca para escribir.
// IMPORTANTE: reemplazar por tu Client ID real de Google Cloud Console (tipo "Web application").
const DRIVE_OAUTH_CLIENT_ID = '805427211710-m8upl6f4nf62vrh7mgjp57tcut2l5r4k.apps.googleusercontent.com';
const DRIVE_WRITE_SCOPE = 'https://www.googleapis.com/auth/drive https://www.googleapis.com/auth/spreadsheets';
let DRIVE_WRITE_TOKEN = null; // solo en memoria, nunca se guarda en disco/Firestore
let _driveTokenClient = null;

function driveRequestWriteAccess(){
  return new Promise((resolve, reject)=>{
    if(!window.google || !window.google.accounts || !window.google.accounts.oauth2){
      reject(new Error('No se pudo cargar el servicio de Google. Revisa tu conexión e intenta de nuevo.'));
      return;
    }
    if(!_driveTokenClient){
      _driveTokenClient = google.accounts.oauth2.initTokenClient({
        client_id: DRIVE_OAUTH_CLIENT_ID,
        scope: DRIVE_WRITE_SCOPE,
        callback: (resp)=>{
          if(resp && resp.access_token){ DRIVE_WRITE_TOKEN = resp.access_token; resolve(DRIVE_WRITE_TOKEN); }
          else reject(new Error('No se pudo autorizar el acceso a Drive.'));
        },
        error_callback: (err)=>{ reject(new Error(err?.message || 'Autorización cancelada o rechazada.')); }
      });
    }
    _driveTokenClient.requestAccessToken();
  });
}

async function driveWriteRequest(path, options={}){
  if(!DRIVE_WRITE_TOKEN) throw new Error('Sin autorización de escritura en Drive.');
  const res = await fetch(`https://www.googleapis.com/drive/v3${path}`, {
    ...options,
    headers: { 'Authorization': `Bearer ${DRIVE_WRITE_TOKEN}`, 'Content-Type':'application/json', ...(options.headers||{}) }
  });
  const data = await res.json().catch(()=>({}));
  if(!res.ok){
    if(res.status===401){ DRIVE_WRITE_TOKEN=null; throw new Error('Autorización de Drive expirada, presiona "Ordenar" de nuevo.'); }
    throw new Error(data?.error?.message || `Error ${res.status} al escribir en Drive`);
  }
  return data;
}

// Busca una subcarpeta por nombre dentro de folderId; si no existe, la crea. Devuelve el id.
async function driveGetOrCreateFolder(parentId, nombre){
  const q = `'${parentId}' in parents and trashed = false and mimeType = 'application/vnd.google-apps.folder' and name = '${nombre.replace(/'/g,"\\'")}'`;
  const found = await driveWriteRequest(`/files?q=${encodeURIComponent(q)}&fields=files(id,name)`);
  if(found.files && found.files.length) return found.files[0].id;
  const created = await driveWriteRequest('/files', {
    method:'POST',
    body: JSON.stringify({ name: nombre, mimeType:'application/vnd.google-apps.folder', parents:[parentId] })
  });
  return created.id;
}

// Mueve un archivo a una nueva carpeta padre (reemplaza todos sus parents actuales)
async function driveMoveFile(fileId, newParentId, oldParentId){
  await driveWriteRequest(`/files/${fileId}?addParents=${newParentId}&removeParents=${oldParentId}&fields=id,parents`, { method:'PATCH' });
}

// Sube un archivo (File del navegador) directo a una carpeta de Drive. Devuelve {id,name,mimeType,modifiedTime}.
async function driveUploadFile(parentFolderId, file){
  if(!DRIVE_WRITE_TOKEN) throw new Error('Sin autorización de escritura en Drive.');
  const metadata = { name: file.name, parents:[parentFolderId] };
  const boundary = 'bpa_beast_' + Date.now();
  const metaPart = `--${boundary}\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n${JSON.stringify(metadata)}\r\n`;
  const fileBuf = await file.arrayBuffer();
  const head = `--${boundary}\r\nContent-Type: ${file.type||'application/octet-stream'}\r\n\r\n`;
  const tail = `\r\n--${boundary}--`;
  const body = new Blob([metaPart, head, fileBuf, tail]);
  const res = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id,name,mimeType,modifiedTime', {
    method:'POST',
    headers: { 'Authorization': `Bearer ${DRIVE_WRITE_TOKEN}`, 'Content-Type': `multipart/related; boundary=${boundary}` },
    body
  });
  const data = await res.json().catch(()=>({}));
  if(!res.ok){
    if(res.status===401){ DRIVE_WRITE_TOKEN=null; throw new Error('Autorización de Drive expirada, intenta de nuevo.'); }
    throw new Error(data?.error?.message || `Error ${res.status} al subir archivo a Drive`);
  }
  return data;
}

// Busca recursivamente (hasta 3 niveles) archivos cuyo nombre haga match con `re`, o —si se pasa
// `mimeTypes`— cuyo mimeType de Drive esté en esa lista (útil para archivos renombrados sin
// extensión, p.ej. una diapositiva PDF a la que el usuario le quitó el ".pdf" del nombre en Drive).
async function driveBuscarArchivoPorPalabras(folderId, apiKey, re, depth=0, mimeTypes=null){
  if(depth > 3) return [];
  const items = await driveListFolder(folderId, apiKey);
  let encontrados = [];
  for(const f of items){
    if(f.mimeType === 'application/vnd.google-apps.folder'){
      encontrados = encontrados.concat(await driveBuscarArchivoPorPalabras(f.id, apiKey, re, depth+1, mimeTypes));
    } else if(re.test(f.name) || (mimeTypes && mimeTypes.includes(f.mimeType))){
      encontrados.push(f);
    }
  }
  return encontrados;
}
async function driveBuscarArchivoCapacitacion(folderId, apiKey, depth=0){
  return driveBuscarArchivoPorPalabras(folderId, apiKey, /capacit|entrenamiento|training/i, depth);
}
async function driveBuscarArchivoAutoinspeccion(folderId, apiKey, depth=0){
  return driveBuscarArchivoPorPalabras(folderId, apiKey, /autoinspecc|inspecci[oó]n/i, depth);
}

// Convierte (copia) un archivo .xlsx de Drive a un Google Sheet nativo editable, en la misma carpeta.
async function driveConvertirAGoogleSheet(fileId, nuevoNombre, parentId){
  const copia = await driveWriteRequest(`/files/${fileId}/copy`, {
    method:'POST',
    body: JSON.stringify({ name: nuevoNombre, mimeType:'application/vnd.google-apps.spreadsheet', parents: parentId?[parentId]:undefined })
  });
  return copia; // {id, name, ...}
}

// Lee valores de un rango de un Google Sheet (Sheets API)
async function sheetsLeerValores(spreadsheetId, range='A1:Z500'){
  if(!DRIVE_WRITE_TOKEN) throw new Error('Sin autorización para leer el Google Sheet.');
  const res = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${spreadsheetId}/values/${encodeURIComponent(range)}`, {
    headers: { 'Authorization': `Bearer ${DRIVE_WRITE_TOKEN}` }
  });
  const data = await res.json().catch(()=>({}));
  if(!res.ok){
    if(res.status===401){ DRIVE_WRITE_TOKEN=null; throw new Error('Autorización expirada, intenta de nuevo.'); }
    throw new Error(data?.error?.message || `Error ${res.status} al leer el Google Sheet`);
  }
  return data.values || [];
}

// Nombres de mes reconocidos (abreviado o completo) -> número de mes (01-12)
const MESES_MAP = {
  ene:'01',enero:'01', feb:'02',febrero:'02',fer:'02', mar:'03',marzo:'03', abr:'04',abril:'04',
  may:'05',mayo:'05', jun:'06',junio:'06', jul:'07',julio:'07', ago:'08',agosto:'08',
  set:'09',sep:'09',septiembre:'09',setiembre:'09', oct:'10',octubre:'10',
  nov:'11',noviembre:'11', dic:'12',diciembre:'12',
};

// Dado un token de encabezado, intenta resolverlo a número de mes admitiendo errores de tipeo
// comunes en estos formatos (p.ej. "FER" en vez de "FEB"). Solo corrige si la posición en la
// fila coincide con el orden esperado Ene..Dic, para no confundir con otra palabra cualquiera.
function mesPorPosicion(token, posicionEnSecuencia){
  const n = normTxt(token).replace(/\./g,'');
  if(MESES_MAP[n]) return MESES_MAP[n];
  const ORDEN = ['ene','feb','mar','abr','may','jun','jul','ago','set','oct','nov','dic'];
  if(posicionEnSecuencia>=0 && posicionEnSecuencia<12 && n.length>=2){
    const esperado = ORDEN[posicionEnSecuencia];
    // típico error de tipeo: comparte primera letra y longitud similar (ej. FER vs FEB)
    if(n[0]===esperado[0] && Math.abs(n.length-esperado.length)<=1) return MESES_MAP[esperado];
  }
  return null;
}

// Busca en cualquier celda de las filas dadas un patrón "Año ... NNNN" o "NNNN" suelto (4 dígitos, 20xx).
function detectarAnio(filas, hastaFila){
  for(let r=0; r<Math.min(hastaFila+2, filas.length); r++){
    for(const cell of (filas[r]||[])){
      const t = (cell||'').toString();
      let m = t.match(/a[nñ]o[^\d]{0,6}(\d{4})/i);
      if(m) return m[1];
      m = t.match(/^\s*(20\d{2})\s*$/);
      if(m) return m[1];
    }
  }
  return String(new Date().getFullYear());
}

// Interpreta un cronograma en formato MATRIZ: columnas TEMA / RESP. seguidas de columnas-mes
// (Ene, Feb, Mar...Dic) donde el día programado se escribe como número en la celda del mes
// correspondiente. Ej: REGISTRO_005_CRONOGRAMA_DE_CAPACITACION.xlsx
function interpretarCronogramaMatriz(filas){
  // 1) localizar la fila que tiene los encabezados de mes
  let filaMeses = -1, colMes = {}; // colMes: índice de columna -> 'MM'
  for(let r=0; r<filas.length; r++){
    const fila = filas[r]||[];
    const hits = {};
    let seq = 0;
    fila.forEach((cell,c)=>{
      if(!(cell||'').toString().trim()) return;
      const mm = mesPorPosicion(cell, seq);
      if(mm){ hits[c]=mm; seq++; }
    });
    if(Object.keys(hits).length>=3){ filaMeses=r; colMes=hits; break; } // >=3 meses para evitar falsos positivos
  }
  if(filaMeses===-1) return [];

  // 2) localizar la columna TEMA (puede estar en la misma fila de meses o una fila arriba)
  let colTema=-1, colArea=-1;
  for(let r=Math.max(0,filaMeses-3); r<=filaMeses; r++){
    const fila = filas[r]||[];
    fila.forEach((cell,c)=>{
      const n = normTxt(cell);
      if(colTema===-1 && /tema|tematica|titulo|asunto/.test(n)) colTema=c;
      if(colArea===-1 && /^(resp\.?|responsable|area)/.test(n)) colArea=c;
    });
  }
  if(colTema===-1) return [];

  const anio = detectarAnio(filas, filaMeses);

  // 3) recorrer filas de datos (debajo de la fila de meses) y leer día programado por mes
  const out = [];
  for(let r=filaMeses+1; r<filas.length; r++){
    const fila = filas[r]||[];
    const tema = (fila[colTema]||'').toString().replace(/\s+/g,' ').trim();
    if(!tema) continue;
    const area = colArea>-1 ? (fila[colArea]||'').toString().trim() : '';
    for(const [cStr,mm] of Object.entries(colMes)){
      const c = parseInt(cStr,10);
      const raw = (fila[c]||'').toString().trim();
      if(!raw) continue;
      const dia = parseInt(raw.match(/\d{1,2}/)?.[0]||'',10);
      if(!dia || dia<1 || dia>31) continue;
      const fecha = `${anio}-${mm}-${String(dia).padStart(2,'0')}`;
      const estRaw = normTxt(raw);
      const est = /realiz|complet|hecho|^r$/.test(estRaw) ? 'realizada' : 'pendiente';
      out.push({ fecha, tema, area: area||'Todos', est });
    }
  }
  return out;
}

// Interpreta el cronograma: primero intenta formato plano (columnas Fecha/Tema/Área/Estado
// en cualquier orden); si no encuentra esas columnas, intenta el formato MATRIZ (TEMA + columnas
// por mes con el día programado dentro de la celda). Devuelve [{fecha, tema, area, est}].
function interpretarCronogramaCapacitacion(filas){
  if(!filas.length) return [];
  const header = filas[0].map(h=>normTxt(h));
  const idx = {
    fecha: header.findIndex(h=>/fecha/.test(h)),
    tema: header.findIndex(h=>/tema|tematica|titulo|asunto/.test(h)),
    area: header.findIndex(h=>/area/.test(h)),
    est: header.findIndex(h=>/estado|status/.test(h)),
  };
  if(idx.fecha===-1 || idx.tema===-1) return interpretarCronogramaMatriz(filas);

  const out = [];
  for(let r=1; r<filas.length; r++){
    const fila = filas[r];
    if(!fila || !fila.length) continue;
    const rawFecha = (fila[idx.fecha]||'').trim();
    const tema = (fila[idx.tema]||'').trim();
    if(!rawFecha || !tema) continue;
    let fecha = '';
    // admite DD/MM/YYYY, DD-MM-YYYY o YYYY-MM-DD
    let m = rawFecha.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})$/);
    if(m) fecha = `${m[3]}-${m[2].padStart(2,'0')}-${m[1].padStart(2,'0')}`;
    else if(/^\d{4}-\d{2}-\d{2}$/.test(rawFecha)) fecha = rawFecha;
    if(!fecha) continue;
    const area = idx.area>-1 ? (fila[idx.area]||'Todos').trim() : 'Todos';
    const estRaw = idx.est>-1 ? normTxt(fila[idx.est]||'') : '';
    const est = /realiz|complet|hecho/.test(estRaw) ? 'realizada' : 'pendiente';
    out.push({ fecha, tema, area: area||'Todos', est });
  }
  return out;
}

// Interpreta un programa de AUTOINSPECCIONES en formato MATRIZ: una fila de encabezado con
// los meses (Ene..Dic), y debajo una fila por ÁREA (Almacén, Personal, etc.) donde cada celda
// del mes tiene un código de la leyenda (P=Proyecto/Programado, R=Realizado) si hay autoinspección
// programada ese mes. Ej: REGISTRO_021_Programa_de_autoinspección_2026.xlsx
// Devuelve [{area, prog, real}] — una entrada por área+mes marcado.
function interpretarProgramaAutoinspeccion(filas){
  if(!filas.length) return [];

  // 1) localizar fila de meses
  let filaMeses=-1, colMes={};
  for(let r=0; r<filas.length; r++){
    const fila = filas[r]||[];
    const hits = {}; let seq=0;
    fila.forEach((cell,c)=>{
      if(!(cell||'').toString().trim()) return;
      const mm = mesPorPosicion(cell, seq);
      if(mm){ hits[c]=mm; seq++; }
    });
    if(Object.keys(hits).length>=3){ filaMeses=r; colMes=hits; break; }
  }
  if(filaMeses===-1) return [];

  const anio = detectarAnio(filas, filaMeses);

  // 2) localizar fila de leyenda para saber qué letra significa "realizado" (por defecto 'R')
  let letraRealizado = 'r';
  for(let r=filaMeses+1; r<filas.length; r++){
    const fila = filas[r]||[];
    const primera = normTxt(fila[0]);
    if(/realiz/.test(primera)){
      const valor = (fila.find((c,i)=>i>0 && (c||'').toString().trim())||'').toString().trim();
      if(valor) letraRealizado = normTxt(valor);
      break;
    }
  }

  // 3) leer filas de área: cualquier fila debajo del encabezado de meses, antes de "LEYENDA",
  //    que tenga texto en la primera columna y no sea ella misma parte del encabezado.
  const out = [];
  for(let r=filaMeses+1; r<filas.length; r++){
    const fila = filas[r]||[];
    const nombreArea = (fila[0]||'').toString().trim();
    if(!nombreArea) continue;
    if(/^leyenda/i.test(nombreArea)) break; // fin de la tabla de áreas
    let marcoAlguno = false;
    for(const [cStr,mm] of Object.entries(colMes)){
      const c = parseInt(cStr,10);
      const raw = (fila[c]||'').toString().trim();
      if(!raw) continue;
      marcoAlguno = true;
      const esRealizado = normTxt(raw)===letraRealizado || /realiz/.test(normTxt(raw));
      // día 1 del mes como fecha programada por defecto (la app permite editar la fecha exacta luego)
      const prog = `${anio}-${mm}-01`;
      out.push({ area: nombreArea, prog, real: esRealizado ? prog : null });
    }
    if(!marcoAlguno) continue; // fila de área sin ninguna marca este año: no genera entradas
  }
  return out;
}

async function buscarYElegirArchivoCapacitacion(folderId, apiKey, emp){
  showSyncIndicator('Buscando archivo de capacitación en Drive…');
  try {
    const candidatos = await driveBuscarArchivoCapacitacion(folderId, apiKey, 0);
    hideSyncIndicator();
    if(!candidatos.length){
      toast('⚠ No se encontró ningún archivo con "capacitación" en el nombre · revisa la carpeta de Drive');
      return;
    }
    openModal(`
      <div class="modal-handle"></div>
      <div class="modal-head"><span class="modal-title">Elige el archivo de capacitación</span><button class="modal-close" onclick="closeModal()">✕</button></div>
      <div class="modal-body">
        <p style="font-size:12px;color:var(--t3);margin-bottom:10px">Se encontraron ${candidatos.length} archivo(s). Elige el que contiene el cronograma de capacitaciones.</p>
        ${candidatos.map((f,i)=>`
          <button class="sheet-opt" data-fi="${i}" style="width:100%;text-align:left;border:1px solid var(--border);border-radius:10px;margin-bottom:8px;padding:10px 12px;">
            <div style="font-size:13px;font-weight:600;color:var(--t1)">${f.name}</div>
            <div style="font-size:11px;color:var(--t3)">Modificado: ${fLocal((f.modifiedTime||'').slice(0,10))}</div>
          </button>`).join('')}
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" onclick="closeModal()">Cancelar</button>
      </div>`,
    m=>{
      m.querySelectorAll('[data-fi]').forEach(b=>b.addEventListener('click', async ()=>{
        const f = candidatos[parseInt(b.dataset.fi,10)];
        closeModal();
        await convertirYEstablecerCapacitacion(f, emp);
      }));
    });
  } catch(e){
    hideSyncIndicator();
    toast('⚠ '+e.message);
  }
}

async function convertirYEstablecerCapacitacion(archivo, emp){
  try {
    showSyncIndicator('Solicitando autorización…');
    if(!DRIVE_WRITE_TOKEN) await driveRequestWriteAccess();

    let sheetId = archivo.id;
    const esXlsx = /\.xlsx?$/i.test(archivo.name);
    if(esXlsx){
      showSyncIndicator('Convirtiendo a Google Sheet editable…');
      const copia = await driveConvertirAGoogleSheet(archivo.id, `Cronograma capacitaciones — ${emp.nombre}`, null);
      sheetId = copia.id;
    }

    emp.capacitacionSheetId = sheetId;
    emp.capacitacionSourceFileId = archivo.id;
    if(FB_UID) fbSaveSettings();

    hideSyncIndicator();
    render();
    toast('Cronograma establecido ✓ · Ábrelo, edítalo y luego sincroniza');
    window.open(`https://docs.google.com/spreadsheets/d/${sheetId}/edit`, '_blank');
  } catch(e){
    hideSyncIndicator();
    toast('⚠ '+e.message);
  }
}

// Lee el Google Sheet vinculado, interpreta el cronograma y crea/actualiza capacitaciones.
// No pisa capacitaciones ya marcadas como "realizada" en la app si la fila del sheet dice "pendiente"
// (evita perder trabajo ya confirmado en la app por un sheet desactualizado).
window.simSyncCronograma = async function(){
  const emp = empresa();
  if(!emp.capacitacionSheetId){ toast('⚠ Primero establece una capacitación'); return; }
  try {
    showSyncIndicator('Solicitando autorización…');
    if(!DRIVE_WRITE_TOKEN) await driveRequestWriteAccess();
    showSyncIndicator('Leyendo cronograma…');
    const filas = await sheetsLeerValores(emp.capacitacionSheetId, 'A1:Z500');
    const items = interpretarCronogramaCapacitacion(filas);
    hideSyncIndicator();
    if(!items.length){
      toast('⚠ No se reconocieron columnas Fecha/Tema en el Sheet · revisa los encabezados');
      return;
    }
    let nuevas=0, actualizadas=0;
    for(const it of items){
      const existing = CAPS.find(c=>c.e===S.emp && c.tema===it.tema && c.fecha===it.fecha);
      if(existing){
        if(existing.est!=='realizada' && it.est==='realizada'){ existing.est='realizada'; if(FB_UID) fbSave('capacitaciones', existing); actualizadas++; }
      } else {
        const nueva = { id:nextId(), e:S.emp, tema:it.tema, area:it.area, frec:'Anual', fecha:it.fecha, est:it.est, asist:'' };
        CAPS.push(nueva);
        if(FB_UID) fbSave('capacitaciones', nueva);
        nuevas++;
      }
    }
    render();
    toast(`Cronograma sincronizado · ${nuevas} nueva(s) · ${actualizadas} actualizada(s) ✓`);
  } catch(e){
    hideSyncIndicator();
    toast('⚠ '+e.message);
  }
};

function parseFileName(name){
  const clean = name.replace(/\.[^.]+$/, '').trim();

  // Patrones de código BPA conocidos (probados contra el PREFIJO de letras solamente,
  // nunca con \b pegado a un dígito: "POE001" no tiene límite de palabra entre E y 0)
  const PREFIJOS_POE     = /^(POE|SOP|PNT|PNO|PR|PRO|PROC)$/i;
  const PREFIJOS_FORMAT  = /^(FOR|FMT|FO|REG|RG|FORM|F)$/i;
  const PREFIJOS_INSTR   = /^(INS|INST|IT|INC|MAN|GUIA|GU)$/i;

  // Buscar versión en cualquier parte: v01, v1, ver01, versión 1, (v2), etc.
  const verMatch = clean.match(/[\(\s_-]v(?:er(?:si[oó]n)?)?\s*\.?(\d+)/i) || clean.match(/\bv(\d+)\b/i);
  const version = verMatch ? verMatch[1].padStart(2,'0') : '01';

  // El código es el primer token corto al inicio del nombre: letras + número, opcionalmente con
  // guiones internos seguidos de más letras/números cortos (p.ej. "POE 026", "POE018", "POE-ALM-002",
  // "SOP-026"). NO se asume que todo antes del primer " - " es el código, y las palabras descriptivas
  // que siguen (con espacios) nunca se incluyen.
  let codigo = '';
  const letraNum = clean.match(/^([A-Za-zÁÉÍÓÚáéíóúñÑ]{2,10}(?:-[A-Za-zÁÉÍÓÚáéíóúñÑ]{1,10})*)[\s-]?(\d+(?:-[A-Za-zÁÉÍÓÚáéíóúñÑ]{1,6}-?\d+)*)/);
  if(letraNum){
    const letras = letraNum[1];
    const sufijo = letraNum[2];
    const usaGuion = letras.includes('-') || /[A-Za-z]/.test(sufijo);
    codigo = (letras + (usaGuion ? '-' : '') + sufijo).replace(/\s+/g,'');
  }
  if(!codigo){
    // fallback: primer palabra si parece sigla (todo mayúsculas, <=10 chars, sin dígitos)
    const firstWord = clean.split(/\s+/)[0];
    codigo = /^[A-ZÁÉÍÓÚÑ]{2,10}$/.test(firstWord) ? firstWord : '';
  }

  // El nombre mostrado es el archivo completo, tal cual está nombrado (sin extensión)
  const nombre = clean;

  // Inferir tipo por prefijo de letras del código (si se detectó alguno)
  let tipoInferido = null;
  const letrasCodigo = (codigo.match(/^[A-Za-zÁÉÍÓÚáéíóúñÑ]+/)||[''])[0];
  if(letrasCodigo){
    if(PREFIJOS_POE.test(letrasCodigo))    tipoInferido = 'POE';
    else if(PREFIJOS_FORMAT.test(letrasCodigo)) tipoInferido = 'Formato';
    else if(PREFIJOS_INSTR.test(letrasCodigo))  tipoInferido = 'Instructivo';
  }

  return { codigo, nombre, version, tipoInferido };
}

// Infiere tipo por contexto: nombre de subcarpeta, ruta, contenido del nombre
function inferirTipoPorContexto(archivo, carpetaNombre){
  const cn = (carpetaNombre||'').toLowerCase();
  const fn = (archivo.name||'').toLowerCase();
  const parsed = parseFileName(archivo.name);

  // Primero por prefijo de código
  if(parsed.tipoInferido) return parsed.tipoInferido;

  // Por nombre de carpeta contenedora
  if(/poe|sop|proc|procedimiento/.test(cn)) return 'POE';
  if(/form|registro|reg|fmt/.test(cn)) return 'Formato';
  if(/inst|instructivo|it\b|manual|guia/.test(cn)) return 'Instructivo';

  // Por nombre del archivo
  if(/\bpoe\b|procedimiento\s+op/.test(fn)) return 'POE';
  if(/\bformat|registro|planilla|lista/.test(fn)) return 'Formato';
  if(/\binst|instructivo|manual\b|guía/.test(fn)) return 'Instructivo';

  // Por extensión + contexto
  if(/\.xlsx?$|\.csv$/i.test(archivo.name)) return 'Formato';
  if(/\.pdf$|\.docx?$/i.test(archivo.name)) return 'POE'; // default para docs

  return 'POE'; // fallback
}

// ===== DRIVE TOKEN MANAGER — Google Identity Services Implicit Flow =====
// No usa Firebase signInWithPopup → no tiene problemas de COOP en GitHub Pages
// ===== DRIVE API — API KEY pública (sin OAuth) =====
// La carpeta debe estar compartida como "cualquiera con el link puede ver"
// La key NUNCA va hardcodeada aquí: cada usuario la ingresa desde el banner/input
// y se guarda en emp.driveApiKey (Firestore) o en esta variable en memoria.
let DRIVE_API_KEY = '';


// Lista archivos/carpetas de un folder de Drive via API pública (con paginación)
async function driveListFolder(folderId, apiKey){
  let items = [];
  let pageToken = '';
  do {
    const params = new URLSearchParams({
      q: `'${folderId}' in parents and trashed = false`,
      fields: 'nextPageToken, files(id,name,mimeType,modifiedTime)',
      pageSize: '1000',
      key: apiKey
    });
    if(pageToken) params.set('pageToken', pageToken);
    const res = await fetch(`https://www.googleapis.com/drive/v3/files?${params.toString()}`);
    const data = await res.json().catch(()=>({}));
    if(!res.ok){
      const msg = data?.error?.message || `Error ${res.status} al leer carpeta de Drive`;
      throw new Error(msg);
    }
    items = items.concat(data.files || []);
    pageToken = data.nextPageToken || '';
  } while(pageToken);
  return items;
}

// Escaneo recursivo: devuelve {archivo, criterio, carpetaNombre}[]
async function driveScanRecursivo(folderId, apiKey, criterios, carpetaNombre='', depth=0){
  if(depth > 3) return [];
  const items = await driveListFolder(folderId, apiKey);
  let resultado = [];

  const subcarpetas = items.filter(f => f.mimeType === 'application/vnd.google-apps.folder');
  const archivos    = items.filter(f => f.mimeType !== 'application/vnd.google-apps.folder');

  // Archivos directamente en esta carpeta
  for(const archivo of archivos){
    const ext = archivo.name.split('.').pop().toLowerCase();
    if(!['pdf','doc','docx','xls','xlsx','ppt','pptx','txt','odt','ods'].includes(ext)) continue;
    const criterio = clasificarPorCriterio(archivo.name, criterios);
    resultado.push({ archivo, criterio, carpetaNombre });
  }

  // Subcarpetas
  for(const sub of subcarpetas){
    const subItems = await driveScanRecursivo(sub.id, apiKey, criterios, sub.name, depth+1);
    resultado = resultado.concat(subItems);
  }

  return resultado;
}

// Sync real con Google Drive — inteligente y recursivo
window.simSync = async function(){
  const emp = empresa();
  if(!emp.driveUrl){ toast('⚠ Primero guarda el link de Drive'); return; }
  const folderId = extractFolderId(emp.driveUrl);
  if(!folderId){ toast('⚠ Link de Drive inválido'); return; }

  const apiKey = emp.driveApiKey || DRIVE_API_KEY;
  if(!apiKey){
    toast('⚠ Configura tu API Key de Google en la sección Drive');
    render(); return;
  }

  const criterios = getCriterios(emp);
  showSyncIndicator('Escaneando carpeta de Drive…');
  DRIVE_EV.length = 0;

  try {
    showSyncIndicator('Leyendo estructura de carpetas…');
    const todosLosArchivos = await driveScanRecursivo(folderId, apiKey, criterios, '', 0);

    if(todosLosArchivos.length === 0){
      hideSyncIndicator();
      DRIVE_EV.push({ id:Date.now(), tipo:'info', title:'Carpeta vacía o sin archivos reconocidos',
        detail:'No se encontraron archivos. Verifica que la carpeta tiene archivos y está compartida como "Cualquiera con el link puede ver".', accion:null });
      render(); toast('⚠ Sin archivos encontrados'); return;
    }

    showSyncIndicator(`Clasificando ${todosLosArchivos.length} archivo(s)…`);
    const porCriterio = {};
    todosLosArchivos.forEach(({archivo,criterio})=>{ if(!porCriterio[criterio]) porCriterio[criterio]=[]; porCriterio[criterio].push(archivo); });

    let nuevos=0, modificados=0, sinCambios=0;

    for(const {archivo, criterio, carpetaNombre} of todosLosArchivos){
      const parsed = parseFileName(archivo.name);
      const driveModDate = new Date(archivo.modifiedTime);
      const driveModISO = driveModDate.toISOString().slice(0,10);
      const existing = DOCUMENTOS.find(d => d.e===S.emp && (d.driveId===archivo.id || (parsed.codigo && d.codigo===parsed.codigo)));
      if(!existing){
        const rev = new Date(driveModDate.getTime() + 365*2*24*3600*1000).toISOString().slice(0,10);
        const area = carpetaNombre && !criterios.some(c=>normTxt(c)===normTxt(carpetaNombre)) ? carpetaNombre : 'Calidad';
        const tipoLegacy = parsed.tipoInferido || inferirTipoPorContexto(archivo, carpetaNombre);
        const newDoc = { id:'drive_'+archivo.id, e:S.emp, codigo:parsed.codigo, nombre:parsed.nombre||parsed.codigo, tipo:tipoLegacy, criterio, area, version:parsed.version, rev, driveId:archivo.id, driveMod:driveModISO, driveNombreOriginal:archivo.name, driveCarpeta:carpetaNombre };
        DOCUMENTOS.push(newDoc);
        if(FB_UID) fbSave('documentos', newDoc);
        DRIVE_EV.unshift({ id:Date.now()+Math.random(), tipo:'new', title:`${parsed.codigo} — ${parsed.nombre||parsed.codigo}`, detail:`📁 ${carpetaNombre||'Raíz'} → ${criterio} · v${parsed.version} · ${fLocal(driveModISO)}`, accion:null });
        nuevos++;
      } else {
        // Siempre se recalcula el criterio con la lógica de clasificación actual — así, si el
        // criterio guardado quedó mal (por una clasificación previa menos precisa), se autocorrige
        // en el siguiente sync en vez de quedar pegado para siempre.
        if(existing.criterio !== criterio){
          existing.criterio = criterio;
          if(FB_UID) fbSave('documentos', existing);
        }
        if(existing.driveMod && driveModISO > existing.driveMod){
          DRIVE_EV.unshift({ id:Date.now()+Math.random(), tipo:'changed', title:`${existing.codigo} — ${existing.nombre}`, detail:`Modificado el ${fLocal(driveModISO)} · v${existing.version} indexada · Pendiente confirmar`, accion:'Revisar y confirmar', docId:existing.id, newDriveMod:driveModISO, driveFileId:archivo.id });
          modificados++;
        } else { sinCambios++; }
        if(!existing.driveId){ existing.driveId=archivo.id; existing.driveMod=driveModISO; if(FB_UID) fbSave('documentos',existing); }
      }
    }

    const resumenTipos = Object.entries(porCriterio).filter(([,a])=>a.length).map(([t,a])=>`${a.length} ${t}`).join(', ');
    if(resumenTipos) DRIVE_EV.push({ id:Date.now()+Math.random(), tipo:'info', title:'Clasificación completada', detail:`Detectados: ${resumenTipos}`, accion:null });

    hideSyncIndicator();
    emp.lastSync = new Date().toISOString();
    if(FB_UID) fbSyncAll();
    render();
    const resumen=[nuevos&&`${nuevos} nuevo(s)`,modificados&&`${modificados} modificado(s)`,sinCambios&&`${sinCambios} sin cambios`].filter(Boolean).join(' · ');
    toast(`Sync completo · ${resumen||'Sin cambios'} ✓`);

  } catch(e){
    hideSyncIndicator('Error: '+e.message);
    console.error('Drive sync error:', e);
    toast('⚠ '+e.message);
  }
};

// Ordena: crea (o reutiliza) una carpeta por cada criterio + MISC dentro de la carpeta raíz
// de Drive, y mueve ahí cada archivo indexado según su criterio. Requiere autorización de escritura.
window.simOrdenar = async function(){
  const emp = empresa();
  if(!emp.driveUrl){ toast('⚠ Primero conecta una carpeta de Drive'); return; }
  const folderId = extractFolderId(emp.driveUrl);
  if(!folderId){ toast('⚠ Link de Drive inválido'); return; }

  if(!DRIVE_WRITE_TOKEN){
    try { showSyncIndicator('Solicitando autorización de Drive…'); await driveRequestWriteAccess(); }
    catch(e){ hideSyncIndicator(); toast('⚠ '+e.message); return; }
  }

  const criterios = getCriterios(emp);
  const docsEmp = DOCUMENTOS.filter(d => d.e===S.emp && d.driveId);
  if(!docsEmp.length){ toast('⚠ No hay archivos indexados, sincroniza primero'); return; }

  try {
    showSyncIndicator('Creando carpetas de orden…');
    const carpetasIds = {};
    for(const nombre of [...criterios, MISC_LABEL]){
      carpetasIds[nombre] = await driveGetOrCreateFolder(folderId, nombre);
    }

    let movidos=0, yaOrdenados=0, errores=0;
    let i=0;
    for(const d of docsEmp){
      i++;
      showSyncIndicator(`Ordenando ${i}/${docsEmp.length}…`);
      const criterio = clasificarPorCriterio(d.driveNombreOriginal||d.nombre, criterios);
      const destinoId = carpetasIds[criterio] || carpetasIds[MISC_LABEL];
      try {
        const info = await driveWriteRequest(`/files/${d.driveId}?fields=parents`);
        const parents = info.parents || [];
        if(parents.length===1 && parents[0]===destinoId){ yaOrdenados++; continue; }
        await driveMoveFile(d.driveId, destinoId, parents.join(','));
        d.criterio = criterio;
        if(FB_UID) fbSave('documentos', d);
        movidos++;
      } catch(e){ console.error('Error moviendo archivo', d.nombre, e); errores++; }
    }

    hideSyncIndicator();
    DRIVE_EV.unshift({ id:Date.now()+Math.random(), tipo:'info', title:'Orden completado',
      detail:`${movidos} movido(s) · ${yaOrdenados} ya en su lugar${errores?` · ${errores} error(es)`:''}`, accion:null });
    render();
    toast(`Orden completo · ${movidos} movido(s)${errores?` · ${errores} error(es)`:''} ✓`);
  } catch(e){
    hideSyncIndicator('Error: '+e.message);
    console.error('Drive ordenar error:', e);
    toast('⚠ '+e.message);
  }
};

/* ===== EXPORTAR ===== */
function exportarResumen(){
  const emp=empresa();
  const docs=DOCUMENTOS.filter(d=>d.e===S.emp);
  const caps=CAPS.filter(c=>c.e===S.emp);
  const insp=INSP.filter(i=>i.e===S.emp);
  const lotes=LOTES.filter(l=>l.e===S.emp);
  const hoy=new Date().toLocaleDateString('es-PE',{year:'numeric',month:'long',day:'numeric'});
  let txt=`REPORTE BPA - ${emp.nombre}\n`;
  txt+=`RUC: ${emp.ruc}\n`;
  txt+=`Generado: ${hoy}\n`;
  txt+='='.repeat(50)+'\n\n';

  txt+='DOCUMENTOS\n';
  txt+='-'.repeat(30)+'\n';
  docs.forEach(d=>{txt+=`[${edoc(d).toUpperCase()}] ${d.codigo} v${d.version} - ${d.nombre} (Rev: ${d.rev})\n`;});
  txt+=`\nTotal: ${docs.length} | Vencidos: ${docs.filter(d=>edoc(d)==='vencido').length} | Por vencer: ${docs.filter(d=>edoc(d)==='por_vencer').length}\n\n`;

  txt+='CAPACITACIONES 2026\n';
  txt+='-'.repeat(30)+'\n';
  caps.forEach(c=>{
    const caps_ = Array.isArray(c.capacitados)?c.capacitados:(c.capacitados?String(c.capacitados).split(/[,\n]/).map(s=>s.trim()).filter(Boolean):[]);
    const extra = [
      c.capacitador?'Capacitador: '+c.capacitador:'',
      caps_.length?'Capacitados: '+caps_.join(', '):'',
      (!c.capacitador && !caps_.length && c.asist)?'Asistentes: '+c.asist:''
    ].filter(Boolean).join(' | ');
    txt+=`[${ecap(c).toUpperCase()}] ${c.tema} - ${c.area} - ${c.fecha}${extra?' | '+extra:''}\n`;
  });
  txt+=`\nTotal: ${caps.length} | Realizadas: ${caps.filter(c=>ecap(c)==='realizada').length}\n\n`;

  txt+='AUTOINSPECCIONES\n';
  txt+='-'.repeat(30)+'\n';
  insp.forEach(i=>{txt+=`[${i.real?'REALIZADA':'PENDIENTE'}] ${i.area} - Prog: ${i.prog}${i.real?' | Real: '+i.real:''} | Hallazgos: ${i.hall}${i.hallDesc?' - '+i.hallDesc:''}\n`;});
  txt+=`\nTotal: ${insp.length} | Realizadas: ${insp.filter(i=>i.real).length}\n\n`;

  txt+='LOTES Y PRODUCTOS\n';
  txt+='-'.repeat(30)+'\n';
  lotes.forEach(l=>{const rs=rsState(l.vigRS);txt+=`[${l.est.toUpperCase()}] ${l.lote} - ${l.prod} | RS: ${l.rs} (${rs.txt}) | Ingreso: ${l.ing}\n  Prov: ${l.prov} → Cli: ${l.cli}\n`;});

  const blob=new Blob([txt],{type:'text/plain;charset=utf-8'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`BPA_${emp.nombre.replace(/\s+/g,'_')}_${new Date().toISOString().slice(0,10)}.txt`;
  a.click();URL.revokeObjectURL(a.href);
  toast('Reporte exportado ✓');
}

/* ===== FIREBASE: PERSISTENCIA ===== */

let FB_UID = null;

// Colección base del usuario
const userCol = (sub) => {
  if(!FB_UID) return null;
  return db.collection('users').doc(FB_UID).collection(sub);
};
const userDoc = (sub, id) => {
  if(!FB_UID) return null;
  return db.collection('users').doc(FB_UID).collection(sub).doc(String(id));
};

// Guardar un ítem en Firestore
async function fbSave(colName, item) {
  if(!FB_UID) return;
  try {
    await userDoc(colName, item.id).set(item);
  } catch(e) { console.error('fbSave error', e); }
}

// Eliminar un ítem en Firestore
async function fbDelete(colName, id) {
  if(!FB_UID) return;
  try {
    await userDoc(colName, String(id)).delete();
  } catch(e) { console.error('fbDelete error', e); }
}

// Cargar toda una colección
async function fbLoad(colName) {
  if(!FB_UID) return [];
  try {
    const snap = await userCol(colName).get();
    return snap.docs.map(d => d.data());
  } catch(e) { console.error('fbLoad error', e); return []; }
}

// Guardar datos de empresa (settings del usuario)
async function fbSaveSettings() {
  if(!FB_UID) return;
  try {
    await db.collection('users').doc(FB_UID).collection('_meta').doc('settings').set({
      emp: S.emp,
      empresas: EMPRESAS,
      capacitadores: CAPACITADORES_HISTORICO,
      capacitados: CAPACITADOS_HISTORICO
    });
  } catch(e) { console.error('fbSaveSettings', e); }
}

// Cargar toda la data desde Firestore
async function fbLoadAll() {
  showSyncIndicator('Cargando datos…');
  try {
    const [docs, caps, insp, lotes, meta] = await Promise.all([
      fbLoad('documentos'),
      fbLoad('capacitaciones'),
      fbLoad('inspecciones'),
      fbLoad('lotes'),
      (async()=>{ try{ const s=await db.collection('users').doc(FB_UID).collection('_meta').doc('settings').get(); return s.exists?s.data():null; }catch(e){return null;} })()
    ]);

    if(docs.length)   { DOCUMENTOS.length=0; docs.forEach(d=>DOCUMENTOS.push(d)); }
    if(caps.length)   { CAPS.length=0;       caps.forEach(d=>CAPS.push(d)); }
    if(insp.length)   { INSP.length=0;       insp.forEach(d=>INSP.push(d)); }
    if(lotes.length)  { LOTES.length=0;      lotes.forEach(d=>LOTES.push(d)); }
    if(meta) {
      if(meta.empresas && meta.empresas.length) {
        EMPRESAS.length=0;
        meta.empresas.forEach(e=>EMPRESAS.push(e));
      }
      // Set active empresa — verify it exists in loaded list
      if(meta.emp && EMPRESAS.find(e=>e.id===meta.emp)) {
        S.emp = meta.emp;
      } else if(EMPRESAS.length) {
        S.emp = EMPRESAS[0].id;
      } else {
        S.emp = '';
      }
      if(meta.capacitadores?.length) { CAPACITADORES_HISTORICO.length=0; meta.capacitadores.forEach(n=>CAPACITADORES_HISTORICO.push(n)); }
      if(meta.capacitados?.length) { CAPACITADOS_HISTORICO.length=0; meta.capacitados.forEach(n=>CAPACITADOS_HISTORICO.push(n)); }
    }
    hideSyncIndicator();
    render();
  } catch(e) {
    console.error('fbLoadAll error', e);
    hideSyncIndicator('Error al cargar');
    render();
  }
}

/* ===== INIT ===== */
// Antes: window.addEventListener('resize', render) se disparaba también cuando
// el teclado virtual se abre en móvil (el viewport se reduce en alto), causando
// un re-render completo que destruye el <input> enfocado y CIERRA EL TECLADO
// justo al empezar a escribir. Ahora solo re-renderizamos si cambia el ANCHO
// (lo único que afecta el layout mobile/desktop) y con debounce.
let _lastWidthForResize = window.innerWidth;
let _resizeDebounce = null;
window.addEventListener('resize', ()=>{
  clearTimeout(_resizeDebounce);
  _resizeDebounce = setTimeout(()=>{
    const w = window.innerWidth;
    if(w === _lastWidthForResize) return; // solo cambió el alto (teclado) — ignorar
    _lastWidthForResize = w;
    // No re-renderizar si hay un input/textarea enfocado (el usuario está escribiendo)
    const active = document.activeElement;
    if(active && (active.tagName==='INPUT' || active.tagName==='TEXTAREA')) return;
    render();
  }, 150);
});

/* ===== PWA SERVICE WORKER ===== */
if('serviceWorker' in navigator){
  const swCode = `
    const CACHE = 'bpa-beast-v4';
    const SKIP = ['firebasestorage','firebaseapp','googleapis','gstatic','firebaseio'];
    self.addEventListener('install', e => {
      self.skipWaiting();
      e.waitUntil(caches.open(CACHE).then(cache => cache.addAll([location.pathname])));
    });
    self.addEventListener('activate', e => { e.waitUntil(self.clients.claim()); });
    self.addEventListener('fetch', e => {
      if(SKIP.some(u => e.request.url.includes(u))) return;
      e.respondWith(
        fetch(e.request).then(res => {
          const clone = res.clone();
          caches.open(CACHE).then(cache => cache.put(e.request, clone));
          return res;
        }).catch(() => caches.match(e.request))
      );
    });
  `;
  const blob = new Blob([swCode], {type:'text/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
}

<script>
/* Handle redirect result when page reloads after Google auth.
   Called once on page load — onAuthStateChanged handles the UI transition. */
auth.getRedirectResult().then(function(result) {
  if (result && result.user) {
    // Redirect sign-in OK — onAuthStateChanged handles UI
  }
}).catch(function(e) {
  const ignorable = ['auth/no-current-user', 'auth/null-user'];
  if (!ignorable.includes(e.code)) {
    const err = document.getElementById('lsError');
    if (err) { err.textContent = '⚠ ' + e.message; err.style.display = 'block'; }
    const btn = document.getElementById('btnGoogleLogin');
    if (btn) { btn.disabled = false; btn.style.opacity = '1'; }
    const txt = document.getElementById('lsBtnText');
    if (txt) txt.textContent = 'Continuar con Google';
  }
});
</script>
</body>
