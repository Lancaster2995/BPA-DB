// Extrae el folder ID del link de Drive
function extractFolderId(url){
  const m = url.match(/\/folders\/([a-zA-Z0-9_-]+)/);
  return m ? m[1] : null;
}

// Construye un link de descarga directa para un archivo de Drive a partir de su fileId.
// Funciona para archivos dentro de una carpeta compartida como "cualquiera con el link puede ver".
function driveDownloadLink(fileId){
  return `https://drive.google.com/uc?export=download&id=${fileId}`;
}
// Abre la descarga de un archivo de Drive asociado (diapositiva o evaluación) en una nueva pestaña/tab.
function descargarArchivoDrive(fileId, nombre){
  if(!fileId){ toast('⚠ Este archivo no está vinculado a Drive (se subió solo localmente, sin carpeta conectada)'); return; }
  window.open(driveDownloadLink(fileId), '_blank');
}

// ===== OAUTH DE ESCRITURA (Google Identity Services) =====
// Necesario solo para "Ordenar" (crear carpetas y mover archivos en Drive real).
// El API Key normal (arriba) solo sirve para LEER, nunca para escribir.
// IMPORTANTE: reemplazar por tu Client ID real de Google Cloud Console (tipo "Web application").
const DRIVE_OAUTH_CLIENT_ID = '805427211710-m8upl6f4nf62vrh7mgjp57tcut2l5r4k.apps.googleusercontent.com';
const DRIVE_WRITE_SCOPE = 'https://www.googleapis.com/auth/drive https://www.googleapis.com/auth/spreadsheets';
let DRIVE_WRITE_TOKEN = null; // solo en memoria, nunca se guarda en disco/Firestore
let _driveTokenClient = null;

function driveRequestWriteAccess(){
  return new Promise((resolve, reject)=>{
    if(!window.google || !window.google.accounts || !window.google.accounts.oauth2){
      reject(new Error('No se pudo cargar el servicio de Google. Revisa tu conexión e intenta de nuevo.'));
      return;
    }
    if(!_driveTokenClient){
      _driveTokenClient = google.accounts.oauth2.initTokenClient({
        client_id: DRIVE_OAUTH_CLIENT_ID,
        scope: DRIVE_WRITE_SCOPE,
        callback: (resp)=>{
          if(resp && resp.access_token){ DRIVE_WRITE_TOKEN = resp.access_token; resolve(DRIVE_WRITE_TOKEN); }
          else reject(new Error('No se pudo autorizar el acceso a Drive.'));
        },
        error_callback: (err)=>{ reject(new Error(err?.message || 'Autorización cancelada o rechazada.')); }
      });
    }
    _driveTokenClient.requestAccessToken();
  });
}

async function driveWriteRequest(path, options={}){
  if(!DRIVE_WRITE_TOKEN) throw new Error('Sin autorización de escritura en Drive.');
  const res = await fetch(`https://www.googleapis.com/drive/v3${path}`, {
    ...options,
    headers: { 'Authorization': `Bearer ${DRIVE_WRITE_TOKEN}`, 'Content-Type':'application/json', ...(options.headers||{}) }
  });
  const data = await res.json().catch(()=>({}));
  if(!res.ok){
    if(res.status===401){ DRIVE_WRITE_TOKEN=null; throw new Error('Autorización de Drive expirada, presiona "Ordenar" de nuevo.'); }
    throw new Error(data?.error?.message || `Error ${res.status} al escribir en Drive`);
  }
  return data;
}

// Busca una subcarpeta por nombre dentro de folderId; si no existe, la crea. Devuelve el id.
async function driveGetOrCreateFolder(parentId, nombre){
  const q = `'${parentId}' in parents and trashed = false and mimeType = 'application/vnd.google-apps.folder' and name = '${nombre.replace(/'/g,"\\'")}'`;
  const found = await driveWriteRequest(`/files?q=${encodeURIComponent(q)}&fields=files(id,name)`);
  if(found.files && found.files.length) return found.files[0].id;
  const created = await driveWriteRequest('/files', {
    method:'POST',
    body: JSON.stringify({ name: nombre, mimeType:'application/vnd.google-apps.folder', parents:[parentId] })
  });
  return created.id;
}

// Mueve un archivo a una nueva carpeta padre (reemplaza todos sus parents actuales)
async function driveMoveFile(fileId, newParentId, oldParentId){
  await driveWriteRequest(`/files/${fileId}?addParents=${newParentId}&removeParents=${oldParentId}&fields=id,parents`, { method:'PATCH' });
}

// Sube un archivo (File del navegador) directo a una carpeta de Drive. Devuelve {id,name,mimeType,modifiedTime}.
async function driveUploadFile(parentFolderId, file){
  if(!DRIVE_WRITE_TOKEN) throw new Error('Sin autorización de escritura en Drive.');
  const metadata = { name: file.name, parents:[parentFolderId] };
  const boundary = 'bpa_beast_' + Date.now();
  const metaPart = `--${boundary}\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n${JSON.stringify(metadata)}\r\n`;
  const fileBuf = await file.arrayBuffer();
  const head = `--${boundary}\r\nContent-Type: ${file.type||'application/octet-stream'}\r\n\r\n`;
  const tail = `\r\n--${boundary}--`;
  const body = new Blob([metaPart, head, fileBuf, tail]);
  const res = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id,name,mimeType,modifiedTime', {
    method:'POST',
    headers: { 'Authorization': `Bearer ${DRIVE_WRITE_TOKEN}`, 'Content-Type': `multipart/related; boundary=${boundary}` },
    body
  });
  const data = await res.json().catch(()=>({}));
  if(!res.ok){
    if(res.status===401){ DRIVE_WRITE_TOKEN=null; throw new Error('Autorización de Drive expirada, intenta de nuevo.'); }
    throw new Error(data?.error?.message || `Error ${res.status} al subir archivo a Drive`);
  }
  return data;
}

// Busca recursivamente (hasta 3 niveles) archivos cuyo nombre haga match con `re`, o —si se pasa
// `mimeTypes`— cuyo mimeType de Drive esté en esa lista (útil para archivos renombrados sin
// extensión, p.ej. una diapositiva PDF a la que el usuario le quitó el ".pdf" del nombre en Drive).
async function driveBuscarArchivoPorPalabras(folderId, apiKey, re, depth=0, mimeTypes=null){
  if(depth > 3) return [];
  const items = await driveListFolder(folderId, apiKey);
  let encontrados = [];
  for(const f of items){
    if(f.mimeType === 'application/vnd.google-apps.folder'){
      encontrados = encontrados.concat(await driveBuscarArchivoPorPalabras(f.id, apiKey, re, depth+1, mimeTypes));
    } else if(re.test(f.name) || (mimeTypes && mimeTypes.includes(f.mimeType))){
      encontrados.push(f);
    }
  }
  return encontrados;
}
async function driveBuscarArchivoCapacitacion(folderId, apiKey, depth=0){
  return driveBuscarArchivoPorPalabras(folderId, apiKey, /capacit|entrenamiento|training/i, depth);
}
async function driveBuscarArchivoAutoinspeccion(folderId, apiKey, depth=0){
  return driveBuscarArchivoPorPalabras(folderId, apiKey, /autoinspecc|inspecci[oó]n/i, depth);
}

// Convierte (copia) un archivo .xlsx de Drive a un Google Sheet nativo editable, en la misma carpeta.
async function driveConvertirAGoogleSheet(fileId, nuevoNombre, parentId){

async function sheetsLeerValores(spreadsheetId, range='A1:Z500'){

// Nombres de mes reconocidos (abreviado o completo) -> número de mes (01-12)
const MESES_MAP = {
  ene:'01',enero:'01', feb:'02',febrero:'02',fer:'02', mar:'03',marzo:'03', abr:'04',abril:'04',
  may:'05',mayo:'05', jun:'06',junio:'06', jul:'07',julio:'07', ago:'08',agosto:'08',
  set:'09',sep:'09',septiembre:'09',setiembre:'09', oct:'10',octubre:'10',
  nov:'11',noviembre:'11', dic:'12',diciembre:'12',
};

// Dado un token de encabezado, intenta resolverlo a número de mes admitiendo errores de tipeo
// comunes en estos formatos (p.ej. "FER" en vez de "FEB"). Solo corrige si la posición en la
// fila coincide con el orden esperado Ene..Dic, para no confundir con otra palabra cualquiera.
function mesPorPosicion(token, posicionEnSecuencia){
  const n = normTxt(token).replace(/\./g,'');
  if(MESES_MAP[n]) return MESES_MAP[n];
  const ORDEN = ['ene','feb','mar','abr','may','jun','jul','ago','set','oct','nov','dic'];
  if(posicionEnSecuencia>=0 && posicionEnSecuencia<12 && n.length>=2){
    const esperado = ORDEN[posicionEnSecuencia];
    // típico error de tipeo: comparte primera letra y longitud similar (ej. FER vs FEB)
    if(n[0]===esperado[0] && Math.abs(n.length-esperado.length)<=1) return MESES_MAP[esperado];
  }
  return null;
}

// Busca en cualquier celda de las filas dadas un patrón "Año ... NNNN" o "NNNN" suelto (4 dígitos, 20xx).
function detectarAnio(filas, hastaFila){
  for(let r=0; r<Math.min(hastaFila+2, filas.length); r++){
    for(const cell of (filas[r]||[])){
      const t = (cell||'').toString();
      let m = t.match(/a[nñ]o[^\d]{0,6}(\d{4})/i);
      if(m) return m[1];
      m = t.match(/^\s*(20\d{2})\s*$/);
      if(m) return m[1];
    }
  }
  return String(new Date().getFullYear());
}

// Interpreta un cronograma en formato MATRIZ: columnas TEMA / RESP. seguidas de columnas-mes
// (Ene, Feb, Mar...Dic) donde el día programado se escribe como número en la celda del mes
// correspondiente. Ej: REGISTRO_005_CRONOGRAMA_DE_CAPACITACION.xlsx
function interpretarCronogramaMatriz(filas){
  // 1) localizar la fila que tiene los encabezados de mes
  let filaMeses = -1, colMes = {}; // colMes: índice de columna -> 'MM'
  for(let r=0; r<filas.length; r++){
    const fila = filas[r]||[];
    const hits = {};
    let seq = 0;
    fila.forEach((cell,c)=>{
      if(!(cell||'').toString().trim()) return;
      const mm = mesPorPosicion(cell, seq);
      if(mm){ hits[c]=mm; seq++; }
    });
    if(Object.keys(hits).length>=3){ filaMeses=r; colMes=hits; break; } // >=3 meses para evitar falsos positivos
  }
  if(filaMeses===-1) return [];

  // 2) localizar la columna TEMA (puede estar en la misma fila de meses o una fila arriba)
  let colTema=-1, colArea=-1;
  for(let r=Math.max(0,filaMeses-3); r<=filaMeses; r++){
    const fila = filas[r]||[];
    fila.forEach((cell,c)=>{
      const n = normTxt(cell);
      if(colTema===-1 && /tema|tematica|titulo|asunto/.test(n)) colTema=c;
      if(colArea===-1 && /^(resp\.?|responsable|area)/.test(n)) colArea=c;
    });
  }
  if(colTema===-1) return [];

  const anio = detectarAnio(filas, filaMeses);

  // 3) recorrer filas de datos (debajo de la fila de meses) y leer día programado por mes
  const out = [];
  for(let r=filaMeses+1; r<filas.length; r++){
    const fila = filas[r]||[];
    const tema = (fila[colTema]||'').toString().replace(/\s+/g,' ').trim();
    if(!tema) continue;
    const area = colArea>-1 ? (fila[colArea]||'').toString().trim() : '';
    for(const [cStr,mm] of Object.entries(colMes)){
      const c = parseInt(cStr,10);
      const raw = (fila[c]||'').toString().trim();
      if(!raw) continue;
      const dia = parseInt(raw.match(/\d{1,2}/)?.[0]||'',10);
      if(!dia || dia<1 || dia>31) continue;
      const fecha = `${anio}-${mm}-${String(dia).padStart(2,'0')}`;
      const estRaw = normTxt(raw);
      const est = /realiz|complet|hecho|^r$/.test(estRaw) ? 'realizada' : 'pendiente';
      out.push({ fecha, tema, area: area||'Todos', est });
    }
  }
  return out;
}

// Interpreta el cronograma: primero intenta formato plano (columnas Fecha/Tema/Área/Estado
// en cualquier orden); si no encuentra esas columnas, intenta el formato MATRIZ (TEMA + columnas
// por mes con el día programado dentro de la celda). Devuelve [{fecha, tema, area, est}].
function interpretarCronogramaCapacitacion(filas){
  if(!filas.length) return [];
  const header = filas[0].map(h=>normTxt(h));
  const idx = {
    fecha: header.findIndex(h=>/fecha/.test(h)),
    tema: header.findIndex(h=>/tema|tematica|titulo|asunto/.test(h)),
    area: header.findIndex(h=>/area/.test(h)),
    est: header.findIndex(h=>/estado|status/.test(h)),
  };
  if(idx.fecha===-1 || idx.tema===-1) return interpretarCronogramaMatriz(filas);

  const out = [];
  for(let r=1; r<filas.length; r++){
    const fila = filas[r];
    if(!fila || !fila.length) continue;
    const rawFecha = (fila[idx.fecha]||'').trim();
    const tema = (fila[idx.tema]||'').trim();
    if(!rawFecha || !tema) continue;
    let fecha = '';
    // admite DD/MM/YYYY, DD-MM-YYYY o YYYY-MM-DD
    let m = rawFecha.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})$/);
    if(m) fecha = `${m[3]}-${m[2].padStart(2,'0')}-${m[1].padStart(2,'0')}`;
    else if(/^\d{4}-\d{2}-\d{2}$/.test(rawFecha)) fecha = rawFecha;
    if(!fecha) continue;
    const area = idx.area>-1 ? (fila[idx.area]||'Todos').trim() : 'Todos';
    const estRaw = idx.est>-1 ? normTxt(fila[idx.est]||'') : '';
    const est = /realiz|complet|hecho/.test(estRaw) ? 'realizada' : 'pendiente';
    out.push({ fecha, tema, area: area||'Todos', est });
  }
  return out;
}

// Interpreta un programa de AUTOINSPECCIONES en formato MATRIZ: una fila de encabezado con
// los meses (Ene..Dic), y debajo una fila por ÁREA (Almacén, Personal, etc.) donde cada celda
// del mes tiene un código de la leyenda (P=Proyecto/Programado, R=Realizado) si hay autoinspección
// programada ese mes. Ej: REGISTRO_021_Programa_de_autoinspección_2026.xlsx
// Devuelve [{area, prog, real}] — una entrada por área+mes marcado.
function interpretarProgramaAutoinspeccion(filas){
  if(!filas.length) return [];

  // 1) localizar fila de meses
  let filaMeses=-1, colMes={};
  for(let r=0; r<filas.length; r++){
    const fila = filas[r]||[];
    const hits = {}; let seq=0;
    fila.forEach((cell,c)=>{
      if(!(cell||'').toString().trim()) return;
      const mm = mesPorPosicion(cell, seq);
      if(mm){ hits[c]=mm; seq++; }
    });
    if(Object.keys(hits).length>=3){ filaMeses=r; colMes=hits; break; }
  }
  if(filaMeses===-1) return [];

  const anio = detectarAnio(filas, filaMeses);

  // 2) localizar fila de leyenda para saber qué letra significa "realizado" (por defecto 'R')
  let letraRealizado = 'r';
  for(let r=filaMeses+1; r<filas.length; r++){
    const fila = filas[r]||[];
    const primera = normTxt(fila[0]);
    if(/realiz/.test(primera)){
      const valor = (fila.find((c,i)=>i>0 && (c||'').toString().trim())||'').toString().trim();
      if(valor) letraRealizado = normTxt(valor);
      break;
    }
  }

  // 3) leer filas de área: cualquier fila debajo del encabezado de meses, antes de "LEYENDA",
  //    que tenga texto en la primera columna y no sea ella misma parte del encabezado.
  const out = [];
  for(let r=filaMeses+1; r<filas.length; r++){
    const fila = filas[r]||[];
    const nombreArea = (fila[0]||'').toString().trim();
    if(!nombreArea) continue;
    if(/^leyenda/i.test(nombreArea)) break; // fin de la tabla de áreas
    let marcoAlguno = false;
    for(const [cStr,mm] of Object.entries(colMes)){
      const c = parseInt(cStr,10);
      const raw = (fila[c]||'').toString().trim();
      if(!raw) continue;
      marcoAlguno = true;
      const esRealizado = normTxt(raw)===letraRealizado || /realiz/.test(normTxt(raw));
      // día 1 del mes como fecha programada por defecto (la app permite editar la fecha exacta luego)
      const prog = `${anio}-${mm}-01`;
      out.push({ area: nombreArea, prog, real: esRealizado ? prog : null });
    }
    if(!marcoAlguno) continue; // fila de área sin ninguna marca este año: no genera entradas
  }
  return out;
}

function parseFileName(name){
  const clean = name.replace(/\.[^.]+$/, '').trim();

  // Patrones de código BPA conocidos (probados contra el PREFIJO de letras solamente,
  // nunca con \b pegado a un dígito: "POE001" no tiene límite de palabra entre E y 0)
  const PREFIJOS_POE     = /^(POE|SOP|PNT|PNO|PR|PRO|PROC)$/i;
  const PREFIJOS_FORMAT  = /^(FOR|FMT|FO|REG|RG|FORM|F)$/i;
  const PREFIJOS_INSTR   = /^(INS|INST|IT|INC|MAN|GUIA|GU)$/i;

  // Buscar versión en cualquier parte: v01, v1, ver01, versión 1, (v2), etc.
  const verMatch = clean.match(/[\(\s_-]v(?:er(?:si[oó]n)?)?\s*\.?(\d+)/i) || clean.match(/\bv(\d+)\b/i);
  const version = verMatch ? verMatch[1].padStart(2,'0') : '01';

  // El código es el primer token corto al inicio del nombre: letras + número, opcionalmente con
  // guiones internos seguidos de más letras/números cortos (p.ej. "POE 026", "POE018", "POE-ALM-002",
  // "SOP-026"). NO se asume que todo antes del primer " - " es el código, y las palabras descriptivas
  // que siguen (con espacios) nunca se incluyen.
  let codigo = '';
  const letraNum = clean.match(/^([A-Za-zÁÉÍÓÚáéíóúñÑ]{2,10}(?:-[A-Za-zÁÉÍÓÚáéíóúñÑ]{1,10})*)[\s-]?(\d+(?:-[A-Za-zÁÉÍÓÚáéíóúñÑ]{1,6}-?\d+)*)/);
  if(letraNum){
    const letras = letraNum[1];
    const sufijo = letraNum[2];
    const usaGuion = letras.includes('-') || /[A-Za-z]/.test(sufijo);
    codigo = (letras + (usaGuion ? '-' : '') + sufijo).replace(/\s+/g,'');
  }
  if(!codigo){
    // fallback: primer palabra si parece sigla (todo mayúsculas, <=10 chars, sin dígitos)
    const firstWord = clean.split(/\s+/)[0];
    codigo = /^[A-ZÁÉÍÓÚÑ]{2,10}$/.test(firstWord) ? firstWord : '';
  }

  // El nombre mostrado es el archivo completo, tal cual está nombrado (sin extensión)
  const nombre = clean;

  // Inferir tipo por prefijo de letras del código (si se detectó alguno)
  let tipoInferido = null;
  const letrasCodigo = (codigo.match(/^[A-Za-zÁÉÍÓÚáéíóúñÑ]+/)||[''])[0];
  if(letrasCodigo){
    if(PREFIJOS_POE.test(letrasCodigo))    tipoInferido = 'POE';
    else if(PREFIJOS_FORMAT.test(letrasCodigo)) tipoInferido = 'Formato';
    else if(PREFIJOS_INSTR.test(letrasCodigo))  tipoInferido = 'Instructivo';
  }

  return { codigo, nombre, version, tipoInferido };
}

// Infiere tipo por contexto: nombre de subcarpeta, ruta, contenido del nombre
function inferirTipoPorContexto(archivo, carpetaNombre){
  const cn = (carpetaNombre||'').toLowerCase();
  const fn = (archivo.name||'').toLowerCase();
  const parsed = parseFileName(archivo.name);

  // Primero por prefijo de código
  if(parsed.tipoInferido) return parsed.tipoInferido;

  // Por nombre de carpeta contenedora
  if(/poe|sop|proc|procedimiento/.test(cn)) return 'POE';
  if(/form|registro|reg|fmt/.test(cn)) return 'Formato';
  if(/inst|instructivo|it\b|manual|guia/.test(cn)) return 'Instructivo';

  // Por nombre del archivo
  if(/\bpoe\b|procedimiento\s+op/.test(fn)) return 'POE';
  if(/\bformat|registro|planilla|lista/.test(fn)) return 'Formato';
  if(/\binst|instructivo|manual\b|guía/.test(fn)) return 'Instructivo';

  // Por extensión + contexto
  if(/\.xlsx?$|\.csv$/i.test(archivo.name)) return 'Formato';
  if(/\.pdf$|\.docx?$/i.test(archivo.name)) return 'POE'; // default para docs

  return 'POE'; // fallback
}

// ===== DRIVE TOKEN MANAGER — Google Identity Services Implicit Flow =====
// No usa Firebase signInWithPopup → no tiene problemas de COOP en GitHub Pages
// ===== DRIVE API — API KEY pública (sin OAuth) =====
// La carpeta debe estar compartida como "cualquiera con el link puede ver"
// La key NUNCA va hardcodeada aquí: cada usuario la ingresa desde el banner/input
// y se guarda en emp.driveApiKey (Firestore) o en esta variable en memoria.
let DRIVE_API_KEY = '';


// Lista archivos/carpetas de un folder de Drive via API pública (con paginación)
async function driveListFolder(folderId, apiKey){
  let items = [];
  let pageToken = '';
  do {
    const params = new URLSearchParams({
      q: `'${folderId}' in parents and trashed = false`,
      fields: 'nextPageToken, files(id,name,mimeType,modifiedTime)',
      pageSize: '1000',
      key: apiKey
    });
    if(pageToken) params.set('pageToken', pageToken);
    const res = await fetch(`https://www.googleapis.com/drive/v3/files?${params.toString()}`);
    const data = await res.json().catch(()=>({}));
    if(!res.ok){
      const msg = data?.error?.message || `Error ${res.status} al leer carpeta de Drive`;
      throw new Error(msg);
    }
    items = items.concat(data.files || []);
    pageToken = data.nextPageToken || '';
  } while(pageToken);
  return items;
}

// Escaneo recursivo: devuelve {archivo, criterio, carpetaNombre}[]
async function driveScanRecursivo(folderId, apiKey, criterios, carpetaNombre='', depth=0){
  if(depth > 3) return [];
  const items = await driveListFolder(folderId, apiKey);
  let resultado = [];

  const subcarpetas = items.filter(f => f.mimeType === 'application/vnd.google-apps.folder');
  const archivos    = items.filter(f => f.mimeType !== 'application/vnd.google-apps.folder');

  // Archivos directamente en esta carpeta
  for(const archivo of archivos){
    const ext = archivo.name.split('.').pop().toLowerCase();
    if(!['pdf','doc','docx','xls','xlsx','ppt','pptx','txt','odt','ods'].includes(ext)) continue;
    const criterio = clasificarPorCriterio(archivo.name, criterios);
    resultado.push({ archivo, criterio, carpetaNombre });
  }

  // Subcarpetas
  for(const sub of subcarpetas){
    const subItems = await driveScanRecursivo(sub.id, apiKey, criterios, sub.name, depth+1);
    resultado = resultado.concat(subItems);
  }

  return resultado;
}

// Sync real con Google Drive — inteligente y recursivo
window.simSync = async function(){
  const emp = empresa();
  if(!emp.driveUrl){ toast('⚠ Primero guarda el link de Drive'); return; }
  const folderId = extractFolderId(emp.driveUrl);
  if(!folderId){ toast('⚠ Link de Drive inválido'); return; }

  const apiKey = emp.driveApiKey || DRIVE_API_KEY;
  if(!apiKey){
    toast('⚠ Configura tu API Key de Google en la sección Drive');
    render(); return;
  }

  const criterios = getCriterios(emp);
  showSyncIndicator('Escaneando carpeta de Drive…');
  DRIVE_EV.length = 0;

  try {
    showSyncIndicator('Leyendo estructura de carpetas…');
    const todosLosArchivos = await driveScanRecursivo(folderId, apiKey, criterios, '', 0);

    if(todosLosArchivos.length === 0){
      hideSyncIndicator();
      DRIVE_EV.push({ id:Date.now(), tipo:'info', title:'Carpeta vacía o sin archivos reconocidos',
        detail:'No se encontraron archivos. Verifica que la carpeta tiene archivos y está compartida como "Cualquiera con el link puede ver".', accion:null });
      render(); toast('⚠ Sin archivos encontrados'); return;
    }

    showSyncIndicator(`Clasificando ${todosLosArchivos.length} archivo(s)…`);
    const porCriterio = {};
    todosLosArchivos.forEach(({archivo,criterio})=>{ if(!porCriterio[criterio]) porCriterio[criterio]=[]; porCriterio[criterio].push(archivo); });

    let nuevos=0, modificados=0, sinCambios=0;

    for(const {archivo, criterio, carpetaNombre} of todosLosArchivos){
      const parsed = parseFileName(archivo.name);
      const driveModDate = new Date(archivo.modifiedTime);
      const driveModISO = driveModDate.toISOString().slice(0,10);
      const existing = DOCUMENTOS.find(d => d.e===S.emp && (d.driveId===archivo.id || (parsed.codigo && d.codigo===parsed.codigo)));
      if(!existing){
        const rev = new Date(driveModDate.getTime() + 365*2*24*3600*1000).toISOString().slice(0,10);
        const area = carpetaNombre && !criterios.some(c=>normTxt(c)===normTxt(carpetaNombre)) ? carpetaNombre : 'Calidad';
        const tipoLegacy = parsed.tipoInferido || inferirTipoPorContexto(archivo, carpetaNombre);
        const newDoc = { id:'drive_'+archivo.id, e:S.emp, codigo:parsed.codigo, nombre:parsed.nombre||parsed.codigo, tipo:tipoLegacy, criterio, area, version:parsed.version, rev, driveId:archivo.id, driveMod:driveModISO, driveNombreOriginal:archivo.name, driveCarpeta:carpetaNombre };
        DOCUMENTOS.push(newDoc);
        if(FB_UID) fbSave('documentos', newDoc);
        DRIVE_EV.unshift({ id:Date.now()+Math.random(), tipo:'new', title:`${parsed.codigo} — ${parsed.nombre||parsed.codigo}`, detail:`📁 ${carpetaNombre||'Raíz'} → ${criterio} · v${parsed.version} · ${fLocal(driveModISO)}`, accion:null });
        nuevos++;
      } else {
        // Siempre se recalcula el criterio con la lógica de clasificación actual — así, si el
        // criterio guardado quedó mal (por una clasificación previa menos precisa), se autocorrige
        // en el siguiente sync en vez de quedar pegado para siempre.
        if(existing.criterio !== criterio){
          existing.criterio = criterio;
          if(FB_UID) fbSave('documentos', existing);
        }
        if(existing.driveMod && driveModISO > existing.driveMod){
          DRIVE_EV.unshift({ id:Date.now()+Math.random(), tipo:'changed', title:`${existing.codigo} — ${existing.nombre}`, detail:`Modificado el ${fLocal(driveModISO)} · v${existing.version} indexada · Pendiente confirmar`, accion:'Revisar y confirmar', docId:existing.id, newDriveMod:driveModISO, driveFileId:archivo.id });
          modificados++;
        } else { sinCambios++; }
        if(!existing.driveId){ existing.driveId=archivo.id; existing.driveMod=driveModISO; if(FB_UID) fbSave('documentos',existing); }
      }
    }

    const resumenTipos = Object.entries(porCriterio).filter(([,a])=>a.length).map(([t,a])=>`${a.length} ${t}`).join(', ');
    if(resumenTipos) DRIVE_EV.push({ id:Date.now()+Math.random(), tipo:'info', title:'Clasificación completada', detail:`Detectados: ${resumenTipos}`, accion:null });

    hideSyncIndicator();
    emp.lastSync = new Date().toISOString();
    if(FB_UID) fbSyncAll();
    render();
    const resumen=[nuevos&&`${nuevos} nuevo(s)`,modificados&&`${modificados} modificado(s)`,sinCambios&&`${sinCambios} sin cambios`].filter(Boolean).join(' · ');
    toast(`Sync completo · ${resumen||'Sin cambios'} ✓`);

  } catch(e){
    hideSyncIndicator('Error: '+e.message);
    console.error('Drive sync error:', e);
    toast('⚠ '+e.message);
  }
};

// Ordena: crea (o reutiliza) una carpeta por cada criterio + MISC dentro de la carpeta raíz
// de Drive, y mueve ahí cada archivo indexado según su criterio. Requiere autorización de escritura.
window.simOrdenar = async function(){
  const emp = empresa();
  if(!emp.driveUrl){ toast('⚠ Primero conecta una carpeta de Drive'); return; }
  const folderId = extractFolderId(emp.driveUrl);
  if(!folderId){ toast('⚠ Link de Drive inválido'); return; }

  if(!DRIVE_WRITE_TOKEN){
    try { showSyncIndicator('Solicitando autorización de Drive…'); await driveRequestWriteAccess(); }
    catch(e){ hideSyncIndicator(); toast('⚠ '+e.message); return; }
  }

  const criterios = getCriterios(emp);
  const docsEmp = DOCUMENTOS.filter(d => d.e===S.emp && d.driveId);
  if(!docsEmp.length){ toast('⚠ No hay archivos indexados, sincroniza primero'); return; }

  try {
    showSyncIndicator('Creando carpetas de orden…');
    const carpetasIds = {};
    for(const nombre of [...criterios, MISC_LABEL]){
      carpetasIds[nombre] = await driveGetOrCreateFolder(folderId, nombre);
    }

    let movidos=0, yaOrdenados=0, errores=0;
    let i=0;
    for(const d of docsEmp){
      i++;
      showSyncIndicator(`Ordenando ${i}/${docsEmp.length}…`);
      const criterio = clasificarPorCriterio(d.driveNombreOriginal||d.nombre, criterios);
      const destinoId = carpetasIds[criterio] || carpetasIds[MISC_LABEL];
      try {
        const info = await driveWriteRequest(`/files/${d.driveId}?fields=parents`);
        const parents = info.parents || [];
        if(parents.length===1 && parents[0]===destinoId){ yaOrdenados++; continue; }
        await driveMoveFile(d.driveId, destinoId, parents.join(','));
        d.criterio = criterio;
        if(FB_UID) fbSave('documentos', d);
        movidos++;
      } catch(e){ console.error('Error moviendo archivo', d.nombre, e); errores++; }
    }

    hideSyncIndicator();
    DRIVE_EV.unshift({ id:Date.now()+Math.random(), tipo:'info', title:'Orden completado',
      detail:`${movidos} movido(s) · ${yaOrdenados} ya en su lugar${errores?` · ${errores} error(es)`:''}`, accion:null });
    render();
    toast(`Orden completo · ${movidos} movido(s)${errores?` · ${errores} error(es)`:''} ✓`);
  } catch(e){
    hideSyncIndicator('Error: '+e.message);
    console.error('Drive ordenar error:', e);
    toast('⚠ '+e.message);
  }
};

/* ===== EXPORTAR ===== */
function exportarResumen(){
  const emp=empresa();
  const docs=DOCUMENTOS.filter(d=>d.e===S.emp);
  const caps=CAPS.filter(c=>c.e===S.emp);
  const insp=INSP.filter(i=>i.e===S.emp);
  const lotes=LOTES.filter(l=>l.e===S.emp);
  const hoy=new Date().toLocaleDateString('es-PE',{year:'numeric',month:'long',day:'numeric'});
  let txt=`REPORTE BPA - ${emp.nombre}\n`;
  txt+=`RUC: ${emp.ruc}\n`;
  txt+=`Generado: ${hoy}\n`;
  txt+='='.repeat(50)+'\n\n';

  txt+='DOCUMENTOS\n';
  txt+='-'.repeat(30)+'\n';
  docs.forEach(d=>{txt+=`[${edoc(d).toUpperCase()}] ${d.codigo} v${d.version} - ${d.nombre} (Rev: ${d.rev})\n`;});
  txt+=`\nTotal: ${docs.length} | Vencidos: ${docs.filter(d=>edoc(d)==='vencido').length} | Por vencer: ${docs.filter(d=>edoc(d)==='por_vencer').length}\n\n`;

  txt+='CAPACITACIONES 2026\n';
  txt+='-'.repeat(30)+'\n';
  caps.forEach(c=>{
    const caps_ = normalizarCapacitados(c.capacitados);
    const extra = [
      c.capacitador?'Expositor: '+c.capacitador:'',
      caps_.length?'Capacitados: '+caps_.map(p=>p.nombre).join(', '):'',
      (!c.capacitador && !caps_.length && c.asist)?'Asistentes: '+c.asist:''
    ].filter(Boolean).join(' | ');
    txt+=`[${ecap(c).toUpperCase()}] ${c.tema} - ${c.area} - ${c.fecha}${extra?' | '+extra:''}\n`;
  });
  txt+=`\nTotal: ${caps.length} | Realizadas: ${caps.filter(c=>ecap(c)==='realizada').length}\n\n`;

  txt+='AUTOINSPECCIONES\n';
  txt+='-'.repeat(30)+'\n';
  insp.forEach(i=>{txt+=`[${i.real?'REALIZADA':'PENDIENTE'}] ${i.area} - Prog: ${i.prog}${i.real?' | Real: '+i.real:''} | Hallazgos: ${i.hall}${i.hallDesc?' - '+i.hallDesc:''}\n`;});
  txt+=`\nTotal: ${insp.length} | Realizadas: ${insp.filter(i=>i.real).length}\n\n`;

  txt+='LOTES Y PRODUCTOS\n';
  txt+='-'.repeat(30)+'\n';
  lotes.forEach(l=>{const rs=rsState(l.vigRS);txt+=`[${l.est.toUpperCase()}] ${l.lote} - ${l.prod} | RS: ${l.rs} (${rs.txt}) | Ingreso: ${l.ing}\n  Prov: ${l.prov} → Cli: ${l.cli}\n`;});

  const blob=new Blob([txt],{type:'text/plain;charset=utf-8'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`BPA_${emp.nombre.replace(/\s+/g,'_')}_${new Date().toISOString().slice(0,10)}.txt`;
  a.click();URL.revokeObjectURL(a.href);
  toast('Reporte exportado ✓');
}

/* ===== FIREBASE: PERSISTENCIA ===== */

let FB_UID = null;

// Colección base del usuario
const userCol = (sub) => {
  if(!FB_UID) return null;
  return db.collection('users').doc(FB_UID).collection(sub);
};
const userDoc = (sub, id) => {
  if(!FB_UID) return null;
  return db.collection('users').doc(FB_UID).collection(sub).doc(String(id));
};

// Guardar un ítem en Firestore
async function fbSave(colName, item) {
  if(!FB_UID) return;
  try {
    await userDoc(colName, item.id).set(item);
  } catch(e) { console.error('fbSave error', e); }
}

// Eliminar un ítem en Firestore
async function fbDelete(colName, id) {
  if(!FB_UID) return;
  try {
    await userDoc(colName, String(id)).delete();
  } catch(e) { console.error('fbDelete error', e); }
}

// Cargar toda una colección
async function fbLoad(colName) {
  if(!FB_UID) return [];
  try {
    const snap = await userCol(colName).get();
    return snap.docs.map(d => d.data());
  } catch(e) { console.error('fbLoad error', e); return []; }
}

// Guardar datos de empresa (settings del usuario)
async function fbSaveSettings() {
  if(!FB_UID) return;
  try {
    await db.collection('users').doc(FB_UID).collection('_meta').doc('settings').set({
      emp: S.emp,
      empresas: EMPRESAS,
      capacitadores: CAPACITADORES_HISTORICO,
      capacitados: CAPACITADOS_HISTORICO
    });
  } catch(e) { console.error('fbSaveSettings', e); }
}

// Cargar toda la data desde Firestore
async function fbLoadAll() {
  showSyncIndicator('Cargando datos…');
  try {
    const [docs, caps, insp, lotes, actasBpa, meta] = await Promise.all([
      fbLoad('documentos'),
      fbLoad('capacitaciones'),
      fbLoad('inspecciones'),
      fbLoad('lotes'),
      fbLoad('actas_bpa'),
      (async()=>{ try{ const s=await db.collection('users').doc(FB_UID).collection('_meta').doc('settings').get(); return s.exists?s.data():null; }catch(e){return null;} })()
    ]);

    if(docs.length)     { DOCUMENTOS.length=0;  docs.forEach(d=>DOCUMENTOS.push(d)); }
    if(caps.length)     { CAPS.length=0;         caps.forEach(d=>CAPS.push(d)); }
    if(insp.length)     { INSP.length=0;         insp.forEach(d=>INSP.push(d)); }
    if(lotes.length)    { LOTES.length=0;        lotes.forEach(d=>LOTES.push(d)); }
    if(actasBpa.length) { ACTAS_BPA.length=0;   actasBpa.forEach(d=>ACTAS_BPA.push(d)); }
    if(meta) {
      if(meta.empresas && meta.empresas.length) {
        EMPRESAS.length=0;
        meta.empresas.forEach(e=>EMPRESAS.push(e));
      }
      // Set active empresa — verify it exists in loaded list
      if(meta.emp && EMPRESAS.find(e=>e.id===meta.emp)) {
        S.emp = meta.emp;
      } else if(EMPRESAS.length) {
        S.emp = EMPRESAS[0].id;
      } else {
        S.emp = '';
      }
      if(meta.capacitadores?.length) { CAPACITADORES_HISTORICO.length=0; meta.capacitadores.forEach(n=>CAPACITADORES_HISTORICO.push(n)); }
      if(meta.capacitados?.length) { CAPACITADOS_HISTORICO.length=0; meta.capacitados.forEach(x=>CAPACITADOS_HISTORICO.push(typeof x==='string'?{nombre:x,cargo:''}:x)); }
    }
    hideSyncIndicator();
    render();
  } catch(e) {
    console.error('fbLoadAll error', e);
    hideSyncIndicator('Error al cargar');
    render();
  }
}

let _syncing = false;

window.fbSyncAll = async function() {
  if(!FB_UID || _syncing) return;
  _syncing = true;
  try {
    await Promise.all([
      ...DOCUMENTOS.filter(d=>d.e===S.emp).map(d=>fbSave('documentos',d)),
      ...CAPS.filter(d=>d.e===S.emp).map(d=>fbSave('capacitaciones',d)),
      ...INSP.filter(d=>d.e===S.emp).map(d=>fbSave('inspecciones',d)),
    ]);
    await fbSaveSettings();
  } finally { _syncing = false; }
};

/* ===== AUTH STATE ===== */
// Redirect result handled by auth.getRedirectResult() call below

auth.onAuthStateChanged( async (user) => {
  if(user) {
    FB_UID = user.uid;
    destroyLogin();
    renderUserBar(user);
    await fbLoadAll();
    // Si venimos de un redirect para Drive, disparar sync automáticamente
  } else {
    FB_UID = null;
    document.getElementById('userBar')?.remove();
    renderLogin();
  }
});

/* ===== INIT ===== */
// Antes: window.addEventListener('resize', render) se disparaba también cuando
// el teclado virtual se abre en móvil (el viewport se reduce en alto), causando
// un re-render completo que destruye el <input> enfocado y CIERRA EL TECLADO
// justo al empezar a escribir. Ahora solo re-renderizamos si cambia el ANCHO
// (lo único que afecta el layout mobile/desktop) y con debounce.
let _lastWidthForResize = window.innerWidth;
let _resizeDebounce = null;
window.addEventListener('resize', ()=>{
  clearTimeout(_resizeDebounce);
  _resizeDebounce = setTimeout(()=>{
    const w = window.innerWidth;
    if(w === _lastWidthForResize) return; // solo cambió el alto (teclado) — ignorar
    _lastWidthForResize = w;
    // No re-renderizar si hay un input/textarea enfocado (el usuario está escribiendo)
    const active = document.activeElement;
    if(active && (active.tagName==='INPUT' || active.tagName==='TEXTAREA')) return;
    render();
  }, 150);
});

/* ===== PWA SERVICE WORKER ===== */
if('serviceWorker' in navigator){
  const swCode = `
    const CACHE = 'bpa-beast-v4';
    const SKIP = ['firebasestorage','firebaseapp','googleapis','gstatic','firebaseio'];
    self.addEventListener('install', e => {
      self.skipWaiting();
      e.waitUntil(caches.open(CACHE).then(cache => cache.addAll([location.pathname])));
    });
    self.addEventListener('activate', e => { e.waitUntil(self.clients.claim()); });
    self.addEventListener('fetch', e => {
      if(SKIP.some(u => e.request.url.includes(u))) return;
      e.respondWith(
        fetch(e.request).then(res => {
          const clone = res.clone();
          caches.open(CACHE).then(cache => cache.put(e.request, clone));
          return res;
        }).catch(() => caches.match(e.request))
      );
    });
  `;
  const blob = new Blob([swCode], {type:'text/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
}

/* ===== PWA INSTALL BANNER ===== */
let _deferredPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  _deferredPrompt = e;
  setTimeout(() => {
    if(!_deferredPrompt || document.getElementById('installBanner')) return;
    const banner = document.createElement('div');
    banner.id = 'installBanner';
    banner.style.cssText = 'position:fixed;bottom:calc(env(safe-area-inset-bottom,0px) + 68px);left:12px;right:12px;background:var(--teal);color:#fff;border-radius:14px;padding:12px 14px;display:flex;align-items:center;gap:10px;z-index:300;box-shadow:0 4px 20px rgba(0,0,0,.3);';
    banner.innerHTML = `<span style="font-size:22px">💊</span>
      <div style="flex:1;min-width:0">
        <div style="font-size:13px;font-weight:700">Instalar BPA Beast</div>
        <div style="font-size:11px;opacity:.85">Accede desde tu pantalla de inicio</div>
      </div>
      <button id="btnInstallYes" style="background:#fff;color:var(--teal);border:none;border-radius:8px;padding:6px 12px;font-size:12px;font-weight:700;cursor:pointer">Instalar</button>
      <button id="btnInstallNo" style="background:none;border:none;color:#fff;font-size:20px;cursor:pointer;line-height:1">✕</button>`;
    document.body.appendChild(banner);
    document.getElementById('btnInstallYes').addEventListener('click', async () => {
      _deferredPrompt.prompt();
      await _deferredPrompt.userChoice;
      _deferredPrompt = null; banner.remove();
    });
    document.getElementById('btnInstallNo').addEventListener('click', () => {
      banner.remove(); _deferredPrompt = null;
    });
  }, 3000);
});

});
